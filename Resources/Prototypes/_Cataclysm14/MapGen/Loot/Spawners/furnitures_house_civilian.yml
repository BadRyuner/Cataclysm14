- type: entity
  name: bedroom furnitures spawner
  id: EntitiesSpawnerStructureFurnituresHouseBedroomStorage
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: green
      - sprite: _Cataclysm14/Structures/Furnitures/shelf_wood.rsi
        state: icon
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red
  - type: RandomSpawner
    prototypes:
    - StructureFurnitureDresserWoodFilledClothingCivilianRandom50
    - StructureFurnitureShelfWoodFilledClothingCivilianRandom50
    - StructureFurnitureShelfWoodStorageFilledClothingCivilianRandom50
    - StructureFurnitureWardrobeWoodFilledClothingCivilianRandom75
    chance: 1
    offset: 0.0
