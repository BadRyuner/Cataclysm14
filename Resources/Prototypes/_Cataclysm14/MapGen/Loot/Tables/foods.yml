#Evil file, will have lots and lots and should be split up at some point but idk.

#MARK: FridgeBasic
- type: entityTable
  id: LootTableFoodFridgeBasicRandom50
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodFridgeBasic
        prob: 0.5

- type: entityTable
  id: LootTableFoodFridgeBasic
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodForaging
        rolls: !type:RangeNumberSelector
          range: 0,5
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodCookedMeat
        rolls: !type:RangeNumberSelector
          range: 0,5
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodCookedMeals
        rolls: !type:RangeNumberSelector
          range: 0,5
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodDrinksClean
        rolls: !type:RangeNumberSelector
          range: 0,5

