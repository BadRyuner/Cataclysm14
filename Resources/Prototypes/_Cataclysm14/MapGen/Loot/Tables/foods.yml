#MARK: US Army MRE
- type: entityTable
  id: LootTableFoodMreUsArmyPack
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodMreUsArmyDrink
        rolls: !type:RangeNumberSelector
          range: 1,2
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodMreUsArmyMeal
        rolls: !type:RangeNumberSelector
          range: 1,2
      - !type:NestedSelector
        weight: 100
        tableId: LootTableFoodMreUsArmySide
        rolls: !type:RangeNumberSelector
          range: 0,3

