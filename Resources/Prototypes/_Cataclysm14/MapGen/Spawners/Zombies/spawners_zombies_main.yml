#MARK: Base
- type: entity
  name: zombie spawner
  id: BaseEntitiesSpawnerMobZombies
  abstract: true
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: _Cataclysm14/Mapping/Spawners/zombies.rsi
        state: zombie-bodybag
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red

