#MARK: LoadoutFAMAS
- type: entityTable
  id: LootTableLoadoutWeaponGunFAMAS
  table: !type:AllSelector
    children:
      - id: WeaponAssaultRifleFAMAS-G2
      - id: Magazine5.56x45mmFMJ
        rolls: !type:RangeNumberSelector
          range: 1,4
      - id: AmmoBox5.56x45mmFMJ
        rolls: !type:RangeNumberSelector
          range: 0,1

#MARK: Guns National Guard
- type: entityTable
  id: LootTableWeaponGunNationalGuard
  table: !type:GroupSelector
    children:
      - id: WeaponAssaultRifleM4A1Empty
      - id: WeaponAssaultRifleM4A1FMJ
      - id: WeaponAssaultRifleM4A1TracerRed
      - id: WeaponLightMachinegunM249Empty
      - id: WeaponLightMachinegunM249FMJ
      - id: WeaponLightMachinegunM249TracerRed
