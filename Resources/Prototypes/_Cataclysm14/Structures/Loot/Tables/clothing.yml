- type: entityTable
  id: LootTableClothingCivilianRandom50
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        weight: 100
        tableId: LootTableClothingCivilian
        prob: 0.5

- type: entityTable
  id: LootTableClothingCivilian
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        weight: 100
        tableId: LootTableClothingTopCivilian
        rolls: !type:RangeNumberSelector
          range: 0,4
      - !type:NestedSelector
        weight: 100
        tableId: LootTableClothingBottomCivilian
        rolls: !type:RangeNumberSelector
          range: 0,4
      - !type:NestedSelector
        weight: 100
        tableId: LootTableClothingShoesCivilian
        rolls: !type:RangeNumberSelector
          range: 0,4
      - !type:NestedSelector
        weight: 100
        tableId: LootTableClothingBagCivilian
        rolls: !type:RangeNumberSelector
          range: 0,2

