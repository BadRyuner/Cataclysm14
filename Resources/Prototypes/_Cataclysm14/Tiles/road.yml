#MARK: Road Markings
#actually an entity but ssssshhhhh

- type: entity
  id: FloorRoadMarkingWhite
  name: white road markings
  description: Some painted on road markings. Looks easy enough to remove by hitting it. Those ones are made with white paint.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: /Textures/_Cataclysm14/Tiles/road/road_line.rsi
    state: line_0
    drawdepth: ThickWire
  - type: Icon
    sprite: /Textures/_Cataclysm14/Tiles/road/road_line.rsi
    state: line_4
  - type: Clickable
  - type: Transform
    anchored: true
    noRot: true
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Appearance
  - type: IconSmooth
    key: RoadMarkings
    base: line_
    mode: CardinalFlags

- type: entity
  parent: FloorRoadMarkingWhite
  id: FloorRoadMarkingYellow
  name: yellow road markings
  description: Some painted on road markings. Looks easy enough to remove by hitting it. Those ones are made with yellow paint.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: /Textures/_Cataclysm14/Tiles/road/road_line.rsi
    color: "#cdc208"
    state: line_0
    drawdepth: ThickWire
  - type: Icon
    sprite: /Textures/_Cataclysm14/Tiles/road/road_line.rsi
    color: "#cdc208"
    state: line_4

