#MARK: RoadLine
#actually an entity but ssssshhhhh

- type: entity
  id: FloorRoadMarkingWhites
  name: white road markings
  description: Some painted on road markings. Looks easy enough to remove by hitting it. Those ones are made with white paint.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: /Textures/_Cataclysm14/Tiles/road/road_line.rsi
    state: line_0
    drawdepth: ThickWire
  - type: Icon
    sprite: /Textures/_Cataclysm14/Tiles/road/road_line.rsi
    state: line_4
  - type: NodeContainer
    nodes:
      power:
        !type:CableNode
        nodeGroupID: HVPower # this SUUUUCKS ass, better solution one week away trust
  - type: CableVisualizer
    statePrefix: line_
  - type: Clickable
  - type: Transform
    anchored: true
    noRot: true
  - type: Fixtures
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Appearance
  - type: CableVis
    node: power
