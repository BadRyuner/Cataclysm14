- type: entity
  id: FloorEntityPitInvisible
  suffix: Invisible Pit/Chasm
  name: FloorEntityPitInvisible
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  parent: MarkerBase
  components:
  - type: Chasm
  - type: StepTrigger
    requiredTriggeredSpeed: 0
    intersectRatio: 0.4
    blacklist:
      tags:
      - Catwalk
  - type: Transform
    anchored: true
    noRot: true
  - type: Clickable
  - type: Sprite
    noRot: true
    sprite: _Cataclysm14/Mapping/warning_pit.rsi
    layers:
    - state: warning_pit
  - type: Icon
    sprite: _Cataclysm14/Mapping/warning_pit.rsi
    state: warning_pit
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        layer:
        - WallLayer
        mask:
        - ItemMask
        density: 1000
        hard: false

