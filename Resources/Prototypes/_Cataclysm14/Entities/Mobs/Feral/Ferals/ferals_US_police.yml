#MARK: US Police officer
- type: entity
  parent: BaseMobFeralRanged
  id: MobFeralPoliceOfficerUS
  suffix: US Police officer
  components:
  #Worn armor isn't effective enough to be a real threat
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Critical
      300: Dead
  - type: Stamina
    critThreshold: 150
  - type: EntityTableContainerFill
    containers:
      outerClothing: !type:NestedSelector
        tableId: LootTableClothingPoliceUsBulletProofVest
        prob: 0.95
      head: !type:GroupSelector
        children:
        - id: ClothingHeadHatCapPoliceUS
        prob: 0.5
      belt: !type:GroupSelector
        children:
        - id: ClothingBeltDutyBeltPolice
        prob: 0.9
      gloves: !type:GroupSelector
        children:
        - id: ClothingHandsGlovesTacticalCombatBlack
        prob: 0.5
      balaclava: !type:GroupSelector
        children:
        - id: ClothingBalaclavaNeckGaiterBlack
        - id: ClothingBalaclavaBalaclavaSkiMaskBlack
        prob: 0.4
      pants: !type:GroupSelector
        children:
        - id: ClothingPantsPoliceCopUS
        prob: 0.99
      jumpsuit: !type:GroupSelector
        children:
        - id: ClothingShirtPoliceCopUS
        prob: 0.99
      shoes: !type:GroupSelector
        children:
        - id: ClothingShoesBootsSWATBlack
        - id: ClothingShoesSneakersBlack
        prob: 0.99

  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.1
    rechargeSound:
      path: /Audio/_NF/Effects/silence.ogg
  - type: BasicEntityAmmoProvider
    proto: PseudoNPCBullet
  - type: Gun
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mk_fire.ogg
      params:
        variation: 0.1
        volume: 13
        pitch: 1.5
        playOffsetSeconds: 0.15
    angleIncrease: 10
    angleDecay: 1
    maxAngle: 30
    minAngle: 10
    shotsPerBurst: 3
    burstCooldown: 2
    burstFireRate: 2
    fireRate: 4
    availableModes:
    - Burst
    selectedMode:
    - Burst
    showExamineText: false
    damageModifier: 20
  - type: Loadout
    prototypes:
    - LoadoutInhandMobFeralPoliceOfficerUS
- type: startingGear
  id: LoadoutInhandMobFeralPoliceOfficerUS
  inhand:
    - TempEntity
    - WeaponPistolGlock17Filled17rdFMJ

#MARK: SWAT officer
