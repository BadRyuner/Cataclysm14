#MARK: Base
- type: entity
  id: PartFeral
  parent: [BaseItem, BaseFeralPart]
  name: "feral body part"
  abstract: true
  components:
  - type: Icon
    sprite: _Cataclysm14/Mobs/Species/Feral/parts.rsi
  - type: BodyPart
    species: SpecieFeralBase
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

#MARK: Torsos
- type: entity
  id: TorsoFeral
  name: "feral torso"
  parent: [PartFeral, BaseFeralTorso]
  components:
  - type: Sprite
    sprite: _Cataclysm14/Mobs/Species/Feral/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

#MARK: Heads
- type: entity
