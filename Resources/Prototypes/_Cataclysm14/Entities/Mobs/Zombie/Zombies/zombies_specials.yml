#MARK: Headless >





#MARK: Naked / no gear
- type: entity
  parent: BaseMobZombieHeadless
  id: MobZombieHeadlessNaked
  suffix: Naked
  components:
  - type: Inventory
    templateId: InvTemplateZombieHeadless

#MARK: Civilian Basic
- type: entity
  parent: BaseMobZombieHeadless
  id: MobZombieHeadlessCivilianBasic
  suffix: Civilian Basic
  components:
  - type: Inventory
    templateId: InvTemplateZombieBase
  - type: EntityTableContainerFill
    containers:
      shoes: !type:NestedSelector
        tableId: LootTableClothingShoesCivilian
        prob: 0.99
      jumpsuit: !type:NestedSelector
        tableId: LootTableClothingTopCivilian
        prob: 0.95
      pants: !type:NestedSelector
        tableId: LootTableClothingBottomCivilian
        prob: 0.99
      back: !type:NestedSelector
        tableId: LootTableClothingBagCivilian
        prob: 0.4

