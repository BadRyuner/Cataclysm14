#MARK: Naked / no gear
- type: entity
  parent: BaseMobZombieSimple
  id: MobZombieNaked
  suffix: Naked
  components:
  - type: Inventory
    templateId: InvTemplateZombieBase

#MARK: Civilian Basic
- type: entity
  parent: BaseMobZombieSimple
  id: MobZombieCivilianBasic
  suffix: Civilian Basic
  components:
  - type: Inventory
    templateId: InvTemplateZombieBase
  - type: EntityTableContainerFill
    containers:
      eyes: !type:NestedSelector
        tableId: LootTableClothingEyesCommonEyewear
        prob: 0.40
      shoes: !type:NestedSelector
        tableId: LootTableClothingShoesCivilian
        prob: 0.99
      jumpsuit: !type:NestedSelector
        tableId: LootTableClothingTopCivilian
        prob: 0.95
      pants: !type:NestedSelector
        tableId: LootTableClothingBottomCivilian
        prob: 0.99
      back: !type:NestedSelector
        tableId: LootTableClothingBagCivilian
        prob: 0.4
      id: !type:GroupSelector
        children:
        - id: AccessIdentificationIDCardUS
        prob: 0.60

