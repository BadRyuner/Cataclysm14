
#MARK: Cleansuit
- type: entity
  parent: BaseMobHumanDeployable
  id: MobHumanDeployableCleansuit
  suffix: Cleansuit
  components:
  - type: EntityTableOutfitContainerFill
    containers:
      suitstorage: !type:GroupSelector
        children:
        - id: ToolTankOxygenFilledOxygen
      eyes: !type:GroupSelector
        children:
        - id: ClothingEyesSafetyGogglesClear
      gloves: !type:NestedSelector
        tableId: LootTableClothingHandsGlovesClean
      shoes: !type:GroupSelector
        children:
        - id: ClothingShoesBootsSWATBootsBlack
      pants: !type:NestedSelector
        tableId: LootTableClothingBottomHighVis
      jumpsuit: !type:NestedSelector
        tableId: LootTableClothingTopCleansuit
      mask: !type:NestedSelector
        tableId: LootTableClothingMaskGasmasksIndustrial
      id: !type:GroupSelector
        children:
        - id: AccessIdentificationIDCardUS

