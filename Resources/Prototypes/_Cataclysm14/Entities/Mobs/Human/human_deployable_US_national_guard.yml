#MARK: National Guard Infantry
- type: entity
  parent: BaseMobHumanDeployable
  id: MobHumanDeployableNationalGuardInfantry
  suffix: National Guard Infantry
  components:
  - type: EntityTableOutfitContainerFill
    containers:
      outerClothing: !type:NestedSelector
        tableId: LootTableClothingNationalGuardBulletProofVest
      head: !type:GroupSelector
        children:
        - id: ClothingHeadHelmetBulletproofACHOCPMulticam
      belt: !type:GroupSelector
        children:
        - id: ClothingBeltDutyBeltTanFilledNationalGuard
      balaclava: !type:GroupSelector
        children:
        - id: ClothingBalaclavaBalaclavaSkiMaskTan
        - id: ClothingBalaclavaBalaclavaSkiMaskCoyoteBrown
      suitstorage: !type:GroupSelector
        children:
        - id: WeaponAssaultRifleM4A1FilledSTANAG30rdTracerRed
      gloves: !type:GroupSelector
        children:
        - id: ClothingHandsGlovesTacticalCombatTan
      shoes: !type:GroupSelector
        children:
        - id: ClothingShoesBootsSWATTan
      back: !type:GroupSelector
        children:
        - id: ClothingBackpackAlicePackTanFilledNationalGuard
      pocket1: !type:GroupSelector
        children:
        - id: Magazine5,56x45mmSTANAG30rdTracerRed
      pocket2: !type:GroupSelector
        children:
        - id: Magazine5,56x45mmSTANAG30rdTracerRed
      pocket3: !type:GroupSelector
        children:
        - id: Magazine5,56x45mmSTANAG30rdTracerRed
      pocket4: !type:GroupSelector
        children:
        - id: Magazine5,56x45mmSTANAG30rdTracerRed
    outfits:
    - slots:
        pants: !type:GroupSelector
          children:
          - id: ClothingPantsCombatUCPCargo
        jumpsuit: !type:GroupSelector
          children:
          - id: ClothingShirtCombatUCPCargo
    - slots:
        pants: !type:GroupSelector
          children:
          - id: ClothingPantsCombatOCPMulticamCargo
        jumpsuit: !type:GroupSelector
          children:
          - id: ClothingShirtCombatOCPMulticamCargo

