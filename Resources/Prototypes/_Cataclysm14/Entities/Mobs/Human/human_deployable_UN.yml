#MARK: UN Peacekeeper
- type: entity
  parent: BaseMobHumanDeployable
  id: MobHumanDeployableUNPeacekeeper
  suffix: UN Peacekeeper
  components:
  - type: EntityTableOutfitContainerFill
    containers:
      outerClothing: !type:NestedSelector
        tableId: LootTableClothingUNPeacekeeperBulletProofVest
      head: !type:GroupSelector
        children:
        - id: ClothingHeadHelmetBulletproofM88UN
      belt: !type:GroupSelector
        children:
        - id: ClothingBeltDutyBeltPoliceFilledPolice
      gloves: !type:GroupSelector
        children:
        - id: ClothingHandsGlovesTacticalCombatBlack
      balaclava: !type:GroupSelector
        children:
        - id: ClothingBalaclavaBalaclavaSkiMaskBlack
      shoes: !type:GroupSelector
        children:
        - id: ClothingShoesBootsSWATBlack
      id: !type:GroupSelector
        children:
        - id: AccessIdentificationPassportUN
    outfits:
    - slots:
        pants: !type:GroupSelector
          children:
          - id: ClothingPantsCombatCCEDesertCargo
        jumpsuit: !type:GroupSelector
          children:
          - id: ClothingShirtCombatCCEDesertCargo
    - slots:
        pants: !type:GroupSelector
          children:
          - id: ClothingPantsCombatCCECargo
        jumpsuit: !type:GroupSelector
          children:
          - id: ClothingShirtCombatCCECargo
    - slots:
        pants: !type:GroupSelector
          children:
          - id: ClothingPantsCombatM81Cargo
        jumpsuit: !type:GroupSelector
          children:
          - id: ClothingShirtCombatM81Cargo


