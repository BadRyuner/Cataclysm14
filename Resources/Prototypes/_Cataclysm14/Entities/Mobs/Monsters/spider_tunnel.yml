
- type: entity
  parent: BaseMobFlesh
  id: MobMonsterSpiderTunnel
  name: tunnel spider
  description: A giant arachnid with glowy eyes and chitine armor.
  suffix: Arachnid #Easy spawn faction
  components:
  - type: NpcFactionMember
    factions:
      - NpcFactionArachnids
  - type: Sprite
    drawdepth: Mobs
    sprite: _Cataclysm14/Mobs/Mob/spider_tunnel.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: spider
  - type: DamageStateVisuals
    states:
      Alive:
        Base: spider
      Dead:
        Base: dead
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      300: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.5
    baseSprintSpeed: 2.5
  - type: MeleeWeapon
    attackRate: 2
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Structural: 150
        Slash: 20 #Horror
        Blunt: 20
        Heat: 20
        Piercing: 20
        Radiation: 10
