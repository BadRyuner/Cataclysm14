
- type: entity
  parent: BaseMobFlesh
  id: MobMonsterBushling
  name: bushling
  description: A small bush with leaves and bra.. is it moving?
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Cataclysm14/Mobs/Mob/bushman.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: alive
      scale: 0.5,0.5
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      300: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.5
    baseSprintSpeed: 2.5
  - type: MeleeWeapon
    attackRate: 2
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Structural: 150
        Slash: 20 #Horror
        Blunt: 20
        Heat: 20
        Piercing: 20
        Radiation: 10
