#MARK: Base
- type: entity
  parent: [ MobElementalBase, MobCombat ]
  id: BaseMobMonsterErrantSoul
  name: errant soul
  abstract: true
  description: A soul that strayed too far from the path or was stuck too long in limbo, now roaming in search of your life essence, at all costs.
  suffix: Lost Soul #Easy spawn faction
  components:
  - type: NpcFactionMember
    factions:
      - NpcFactionLostSouls
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: Sprite
    drawdepth: Mobs
    state: alive
  - type: MovementSpeedModifier
    baseWalkSpeed: 1
    baseSprintSpeed: 2
  - type: MeleeWeapon
    attackRate: 0.5
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Structural: 150
        Slash: 20
        Blunt: 20
        Heat: 20
        Piercing: 20
        Radiation: 10
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectLifeEssenceStack1:
            min: 1
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

#MARK: Murderer
- type: entity
  parent: BaseMobMonsterErrantSoul
  id: MobMonsterErrantSoulMurderer
  name: murderer errant soul
  suffix: Lost Soul #Easy spawn faction
  components:
  - type: Sprite
    sprite: _Cataclysm14/Mobs/Mob/ErrantSouls/errant_soul_murderer.rsi
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.5
    baseSprintSpeed: 3.5
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Slash: 12

#MARK: Rescuer
- type: entity
  parent: BaseMobMonsterErrantSoul
  id: MobMonsterErrantSoulRescuer
  name: rescuer errant soul
  suffix: Lost Soul #Easy spawn faction
  components:
  - type: Sprite
    sprite: _Cataclysm14/Mobs/Mob/ErrantSouls/errant_soul_rescuer.rsi
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseSprintSpeed: 2.5
  - type: MeleeWeapon
    soundHit:
      collection: MetalThud
    attackRate: 0.5
    damage:
      types:
        Blunt: 20

#MARK: Lurker
- type: entity
  parent: BaseMobMonsterErrantSoul
  id: MobMonsterErrantSoulLurker
  name: lurker errant soul
  suffix: Lost Soul #Easy spawn faction
  components:
  #Alternative way to make sprite
  - type: Sprite
    layers:
    - sprite: _Cataclysm14/Mobs/Mob/ErrantSouls/errant_soul_base.rsi
      state: alive
    - sprite: _Mono/Clothing/Balaclavas/balaclava_classic.rsi
      state: equipped-BALACLAVA
      color: "#131313"
    - sprite: _Cataclysm14/Clothing/Shirt/shirt_digital_black.rsi
      state: equipped-INNERCLOTHING
    - sprite: _Cataclysm14/Clothing/Pants/pants_digital_black.rsi
      state: equipped-PANTS
      offset: 0,0.08
    - sprite: _Cataclysm14/Clothing/Head/Helmets/helmet_bulletproof_M88_any.rsi
      state: equipped-HELMET
      color: "#202020"
    - sprite: _Cataclysm14/Clothing/Hands/gloves_tactical_any.rsi
      state: equipped-HAND
      color: "#202020"
    - sprite: _Cataclysm14/Clothing/HelmetAttachment/nvg_PVS-14_dual.rsi
      state: equipped-HELMETATTACHMENT
    - sprite: Objects/Weapons/Melee/kukri_knife.rsi
      state: inhand-right
    - sprite: _Cataclysm14/Clothing/Vests/BulletproofVests/vest_bulletproof_IOTV_medium_black.rsi
      state: equipped-OUTERCLOTHING
  - type: MovementSpeedModifier
    baseWalkSpeed: 5
    baseSprintSpeed: 5
  - type: MeleeWeapon
    attackRate: 3
    damage:
      types:
        Slash: 4

#MARK: Burner
