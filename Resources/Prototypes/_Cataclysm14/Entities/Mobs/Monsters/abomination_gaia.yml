
- type: entity
  parent: BaseMobFlesh
  id: MobMonsterAbominationGaia
  name: Gaïa abomination
  description: A large tree with leaves and bra.. is it moving, and glowing? OH GOD!
  suffix: Living Plant #Easy spawn faction
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Cataclysm14/Mobs/Mob/abomination_gaia.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: alive
      scale: 2,2
  - type: DamageStateVisuals
    states:
      Alive:
        Base: abomination
      Dead:
        Base: dead
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      2000: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 2
  - type: MeleeWeapon
    attackRate: 2
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Structural: 150
        Slash: 20 #Horror
        Blunt: 20
        Heat: 20
        Piercing: 20
        Radiation: 10
  - type: Fixtures
    fixtures:
      flammable:
        shape:
          !type:PhysShapeCircle
          radius: 1
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepThud
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: NpcFactionMember
    factions:
      - NpcFactionLivingPlants
