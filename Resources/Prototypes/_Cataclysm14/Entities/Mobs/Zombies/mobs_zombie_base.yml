#MARK: Mob Tesla
- type: entity
  id: BaseMobZombieTesla
  abstract: true
  name: tesla zombie
  description: An undead human, a green-ish pale zombie that seems to be pulsing with electricity.
  categories: [ HideSpawnMenu ]
  parent:
  - MobHumanoidHostileAISimpleRanged
  - BasePrototypeSpecieZombie
  - BaseMobZombieStats
  components:
  - type: Sprite
    layers:
    - map: ["enum.HumanoidVisualLayers.Handcuffs"] #spam errors if it isn't there, no clue why
      color: "#ffffff"
      sprite: Objects/Misc/handcuffs.rsi
      state: body-overlay-2
      visible: false
    - map: [ "lightning" ]
      sprite: _Cataclysm14/Effects/electricity.rsi
      state: lightning
      shader: unshaded
    - map: [ "electricity" ]
      sprite: _Cataclysm14/Effects/electrified.rsi
      state: electrified
      shader: unshaded
  - type: Body
    prototype: BodyPartSetZombieBase
    requiredLegs: 2
  - type: MovementSpeedModifier
#Praise shitmed, this dont do shit, edit the legs inside parts_zombie.yml and specie_zombie.yml
    baseWalkSpeed : 4.5
    baseSprintSpeed : 4.5
  - type: ProjectileBatteryAmmoProvider
    proto: ProjectileLightningZombie
    fireCost: 1
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 1
  - type: Battery
    maxCharge: 1
    startingCharge: 1
  - type: Gun
    projectileSpeed: 20
    showExamineText: false
    fireRate: 1
    minAngle: 0
    maxAngle: 0
    soundGunshot:
      path: /Audio/Effects/Lightning/lightningshock.ogg
      params:
        variation: 0.2
  - type: Insulated

#MARK: Projectile tesla
- type: entity
  name: ball lightning
  id: ProjectileLightningZombie
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Cataclysm14/Effects/electricity.rsi
    layers:
    - state: lightning_ball
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 35
  - type: EmbeddableProjectile
  - type: Projectile
    deleteOnCollide: true
    damage:
      types:
        Piercing: 0
        Heat: 4
        Shock: 4
  - type: Electrified
    requirePower: false
  # - type: Tag
  #   tags:
  #     - HideContextMenu
  - type: Timer
  - type: TimedSpawner
    prototypes:
    - ProjectileEffectLightning
    chance: 1.0
    intervalSeconds: 0.025
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 1
  - type: TimedDespawn
    lifetime: 0.3

