#MARK: body: Base
- type: body
  id: BodyPartSetZombieBase
  name: "zombie"
  root: torso
  slots:
    head:
      part: HeadZombie
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoHuman
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      - head
      organs:
        heart: OrganHumanHeart
        lungs: OrganHumanLungs
        stomach: OrganHumanStomach
        liver: OrganHumanLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmZombie
      connections:
      - right hand
    left arm:
      part: LeftArmZombie
      connections:
      - left hand
    right hand:
      part: RightHandZombie
    left hand:
      part: LeftHandZombie
    right leg:
      part: RightLegZombie
      connections:
      - right foot
    left leg:
      part: LeftLegZombie
      connections:
      - left foot
    right foot:
      part: RightFootZombie
    left foot:
      part: LeftFootZombie

