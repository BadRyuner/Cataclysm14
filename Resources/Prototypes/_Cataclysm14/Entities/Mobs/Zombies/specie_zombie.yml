- type: body
  id: Zombie
  name: "human"
  root: torso
  slots:
    head:
      part: HeadZombie
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoHuman
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      - head # Shitmed
      organs:
        heart: OrganHumanHeart
        lungs: OrganHumanLungs
        stomach: OrganHumanStomach
        liver: OrganHumanLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmZombie
      connections:
      - right hand
    left arm:
      part: LeftArmZombie
      connections:
      - left hand
    right hand:
      part: RightHandZombie
    left hand:
      part: LeftHandZombie
    right leg:
      part: RightLegZombie
      connections:
      - right foot
    left leg:
      part: LeftLegZombie
      connections:
      - left foot
    right foot:
      part: RightFootZombie
    left foot:
      part: LeftFootZombie

- type: species
  id: Zombie
  name: species-name-zombie
  roundStart: false
  prototype: MobZombie
  sprites: MobZombieSprites
  defaultSkinTone: "#4F7942"
  markingLimits: MobZombieMarkingLimits
  dollPrototype: MobZombieDummy
  skinColoration: HumanToned

- type: speciesBaseSprites
  id: MobZombieSprites
  sprites:
    Head: MobZombieHead
    Chest: MobZombieTorso
    Eyes: MobHumanoidEyes
    LArm: MobZombieLArm
    RArm: MobZombieRArm
    LHand: MobZombieLHand
    RHand: MobZombieRHand
    LLeg: MobZombieLLeg
    RLeg: MobZombieRLeg
    LFoot: MobZombieLFoot
    RFoot: MobZombieRFoot

- type: markingPoints
  id: MobZombieMarkingLimits
  points:
    Chest:
      points: 0
      required: false
    Legs:
      points: 8 # imp 2<8
      required: false
    Arms:
      points: 8 # imp 2<8
      required: false

