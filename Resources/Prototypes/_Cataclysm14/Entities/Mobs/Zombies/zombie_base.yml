#MARK: Mob Tesla
- type: entity
  id: BaseMobZombieTesla
  abstract: true
  name: tesla zombie
  description: An undead human, a green-ish pale zombie that seems to be pulsing with electricity.
  categories: [ HideSpawnMenu ]
  parent:
  - MobHumanoidHostileAISimpleRanged
  - BasePrototypeSpecieZombie
  - BaseMobZombieStats
  components:
  - type: Body
    prototype: BodyPartSetZombieBase
    requiredLegs: 2
  - type: MovementSpeedModifier
    baseWalkSpeed : 4.5
    baseSprintSpeed : 4.5
  - type: MeleeWeapon
    attackRate: 0.8
    altDisarm: false
    hidden: true
    soundHit:
      collection: AlienClaw
    animation: WeaponArcBite
    damage:
      types:
        Brute: 8
        Slash: 5
  - type: ProjectileBatteryAmmoProvider
    proto: ProjectileLightingZombie
    fireCost: 1
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 1
  - type: Battery
    maxCharge: 1
    startingCharge: 1
  - type: Gun
    projectileSpeed: 100
    showExamineText: false
    fireRate: 0.1
    minAngle: 0
    maxAngle: 15
    soundGunshot:
      path: /Audio/Effects/Lightning/lightningshock.ogg
      params:
        variation: 0.2

- type: entity
  name: ball lightning
  id: ProjectileLightingZombie
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Cataclysm14/Effects/electricity.rsi
    layers:
    - state: lighting_ball
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 35
  - type: EmbeddableProjectile
  - type: Projectile
    deleteOnCollide: false
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
    damage:
      types:
        Piercing: 0
        Heat: 17
        Shock: 10
  - type: Electrified
    requirePower: false
  - type: Tag
    tags:
      - HideContextMenu
  - type: Timer
  - type: TimedSpawner
    prototypes:
    - ProjectileEffectLighting
    intervalSeconds: 0.2
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 99
  - type: TimedDespawn
    lifetime: 1

- type: entity
  name: ball lightning
  id: ProjectileEffectLighting
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Cataclysm14/Effects/electricity.rsi
    layers:
    - state: lighting
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 35
  - type: Projectile
    deleteOnCollide: false
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
    damage:
      types:
        Piercing: 0
        Heat: 17
        Shock: 10
  - type: Electrified
    requirePower: false
  - type: Tag
    tags:
      - HideContextMenu
  - type: TimedDespawn
    lifetime: 0.8
