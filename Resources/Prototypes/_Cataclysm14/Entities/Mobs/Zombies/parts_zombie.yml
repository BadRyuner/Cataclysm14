- type: entity
  id: PartZombie
  parent: [BaseItem, BasePart]
  name: "zombie body part"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: _Cataclysm14/Mobs/Species/Zombie/parts.rsi
  - type: BodyPart # Shitmed Change
    species: Zombie
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoZombie
  name: "zombie torso"
  parent: [PartZombie, BaseTorso]
  components:
