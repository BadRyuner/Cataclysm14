#MARK: Base
- type: entity
  id: PartZombie
  parent: [BaseItem, BaseZombiePart]
  name: "zombie body part"
  abstract: true
  components:
  - type: Icon
    sprite: _Cataclysm14/Mobs/Species/Zombie/parts.rsi
  - type: BodyPart
    species: SpecieZombieBase
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

#MARK: Torsos
- type: entity
  id: TorsoZombie
  name: "zombie torso"
  parent: [PartZombie, BaseZombieTorso]
  components:
  - type: Sprite
    sprite: _Cataclysm14/Mobs/Species/Zombie/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

