#MARK: National Guard
- type: entity
  parent: BaseMobZombieSimple
  id: MobZombieNationalGuard
  suffix: National Guard
  components:
  - type: Inventory
    templateId: InvTemplateZombieBase
  - type: EntityTableOutfitContainerFill
    containers:
      outerClothing: !type:NestedSelector
        tableId: LootTableClothingNationalGuardBulletProofVest
        prob: 0.95
      head: !type:GroupSelector
        children:
        - id: ClothingHeadBulletproofHelmetACHOCPMulticam
        prob: 0.8
      belt: !type:GroupSelector
        children:
        - id: ClothingBeltDutyBeltTanFilledMilitary
          weight: 2
        - id: ClothingBeltDutyBeltTan
        prob: 0.8
      balaclava: !type:GroupSelector
        children:
        - id: ClothingBalaclavaSkiMaskTan
        - id: ClothingBalaclavaSkiMaskCoyoteBrown
        prob: 0.2
      slingfront: !type:NestedSelector
        tableId: LootTableWeaponGunNationalGuard
        prob: 0.01
      suitstorage: !type:NestedSelector
        tableId: LootTableWeaponGunNationalGuard
        prob: 0.01
      gloves: !type:GroupSelector
        children:
        - id: ClothingHandsGlovesTacticalCombatTan
        prob: 0.8
      shoes: !type:GroupSelector
        children:
        - id: ClothingShoesTacticalSwatTan
        prob: 0.99
      back: !type:GroupSelector
        children:
        - id: ClothingBackpackAlicePackTanFilledMilitary
          weight: 2
        - id: ClothingBackpackAlicePackTan
        prob: 0.99
    outfits:
    - slots:
        pants: !type:GroupSelector
          children:
          - id: ClothingPantsCombatUCP
          - id: ClothingPantsCombatUCPCargo
        jumpsuit: !type:GroupSelector
          children:
          - id: ClothingShirtCombatUCP
          - id: ClothingShirtCombatUCPCargo
          prob: 0.9
    - slots:
        pants: !type:GroupSelector
          children:
          - id: ClothingPantsCombatOCPMulticam
          - id: ClothingPantsCombatOCPMulticamCargo
        jumpsuit: !type:GroupSelector
          children:
          - id: ClothingShirtCombatOCPMulticam
          - id: ClothingShirtCombatOCPMulticamCargo
          prob: 0.9

