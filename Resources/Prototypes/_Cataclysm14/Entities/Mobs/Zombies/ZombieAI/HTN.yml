#MARK: Basic range
- type: entity
  id: MobHumanoidHostileAISimpleMeleeZombieBase
  abstract: true
  components:
  - type: HTN
    rootTask:
       task: SimpleHostileCompoundZombieBase
    blackboard:
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true

- type: htnCompound
  id: SimpleHostileCompoundZombieBase
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompoundZombieBase
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompoundZombieBase

- type: htnCompound
  id: IdleCompoundZombieBase
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:WaitOperator
            key: IdleTime
          preconditions:
            - !type:KeyExistsPrecondition
              key: IdleTime

- type: htnCompound
  id: MeleeCombatCompoundZombieBase
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: NearbyMeleeTargetsZombieBase
        - !type:HTNCompoundTask
          task: BeforeMeleeAttackTargetCompoundZombieBase

- type: htnCompound
  id: BeforeMeleeAttackTargetCompoundZombieBase
  branches:
    - preconditions:
        - !type:BuckledPrecondition
          isBuckled: true
      tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UnbuckleOperator
            shutdownState: TaskFinished

    - preconditions:
        - !type:PulledPrecondition
          isPulled: true
      tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UnPullOperator
            shutdownState: TaskFinished

    - preconditions:
        - !type:InContainerPrecondition
          isInContainer: true
      tasks:
        - !type:HTNCompoundTask
          task: EscapeCompound

    #Cataclysm14, no need to grab weapon
    # Pickup weapon if we don't have one.
    # - preconditions:
    #     - !type:ActiveHandComponentPrecondition
    #         components:
    #           # Just serializer things
    #           - type: MeleeWeapon
    #             damage:
    #               types:
    #                 Blunt: 0
    #         invert: true
    #   tasks:
    #     - !type:HTNCompoundTask
    #       task: PickupMeleeCompound

    # Melee combat (unarmed or otherwise)
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeAttackTargetCompoundZombieBase

# Tries to melee attack our target.
- type: htnCompound
  id: MeleeAttackTargetCompoundZombieBase
  branches:
    - preconditions:
      - !type:KeyExistsPrecondition
        key: Target
      tasks:
        - !type:HTNPrimitiveTask
          operator: !type:MoveToOperator
            shutdownState: PlanFinished
            pathfindInPlanning: true
            removeKeyOnFinish: false
            brakeMaxVelocity: null # Monolith - don't try to brake
            targetKey: TargetCoordinates
            pathfindKey: TargetPathfind
            rangeKey: MeleeRange
        - !type:HTNPrimitiveTask
          operator: !type:JukeOperator
            jukeType: Away
        - !type:HTNPrimitiveTask
          operator: !type:MeleeOperator
            targetKey: Target
          preconditions:
            - !type:KeyExistsPrecondition
              key: Target
            - !type:TargetInRangePrecondition
              targetKey: Target
              rangeKey: MeleeRange
          services:
            - !type:UtilityService
              id: MeleeService
              proto: NearbyMeleeTargetsZombieBase
              key: Target

- type: utilityQuery
  id: NearbyMeleeTargetsZombieBase
  query:
    - !type:NearbyHostilesQuery
  considerations:
    - !type:TargetIsAliveCon
      curve: !type:BoolCurve
    - !type:TargetDistanceCon
      curve: !type:PresetCurve
        preset: TargetDistanceZombieBase
    - !type:TargetHealthCon
      curve: !type:PresetCurve
        preset: TargetHealth
    - !type:TargetAccessibleCon
      curve: !type:BoolCurve
    - !type:TargetInLOSOrCurrentCon
      curve: !type:BoolCurve

- type: utilityCurvePreset
  id: TargetDistanceZombieBase
  curve: !type:QuadraticCurve
    slope: -1
    exponent: 1
    yOffset: 1
    xOffset: 0

#MARK: Reduced range
