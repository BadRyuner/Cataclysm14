#MARK: LoadoutFAMAS
- type: entityTable
  id: LootTableLoadoutWeaponGunFAMAS
  table: !type:AllSelector
    children:
      - !type:GroupSelector
          children:
          - id: WeaponAssaultRifleFAMAS_G2FilledFAMAS25rdEmpty
          - id: WeaponAssaultRifleFAMAS_G2FilledFAMAS25rdFMJ
      - id: Magazine5,56x45mmFAMAS25rdFMJ
        rolls: !type:RangeNumberSelector
          range: 1,4
      - id: AmmoBox5,56x45mmFMJ
        rolls: !type:RangeNumberSelector
          range: 0,2

