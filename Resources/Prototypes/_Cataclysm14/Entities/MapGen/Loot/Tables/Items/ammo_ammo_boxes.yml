#MARK: Bulk ammo >






#MARK: AmmoBoxMilLow
- type: entityTable
  id: LootTableAmmunitionAmmoBoxMilitaryGradeLowTier
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        weight: 100
        tableId: LootTableAmmunitionAmmoBox9x19mmParabellumMilitaryGradeLowTier
      - !type:NestedSelector
        weight: 100
        tableId: LootTableAmmunitionAmmoBox5,56x45mmMilitaryGradeLowTier
      - !type:NestedSelector
        weight: 100
        tableId: LootTableAmmunitionAmmoBox7,62x51mmMilitaryGradeLowTier

