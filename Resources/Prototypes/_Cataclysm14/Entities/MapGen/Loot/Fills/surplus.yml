#MARK: Surplus Clothings
- type: entity
  id: StructureFurnitureShelfMetalFilledSurplusClothings
  suffix: Surplus Clothings 100%
  parent: StructureFurnitureShelfMetal
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:GroupSelector
        children:
        - !type:AllSelector
          children:
          - !type:NestedSelector
            tableId: LootTableClothingsSurplus
          rolls: !type:RangeNumberSelector
            range: 4,20

