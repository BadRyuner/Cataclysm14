#MARK: Ammo Shelves
- type: entity
  id: StructureFurnitureShelfMetalFilledGunshopAmmo
  suffix: Gunshop 100%
  parent: StructureFurnitureShelfMetal
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:GroupSelector
        children:
        - !type:NestedSelector
          tableId: LootTableAmmunitionAmmoBoxCivilianGradeLowTier
        - !type:NestedSelector
          tableId: LootTableAmmunitionAmmoBoxCivilianGradeMediumTier
        rolls: !type:RangeNumberSelector
