#MARK: Shelf Tools
- type: entity
  id: StructureFurnitureShelfMetalFilledToolsCommon
  suffix: Tools 100%
  parent: StructureFurnitureShelfMetal
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:GroupSelector
        children:
        - !type:AllSelector
          children:
          - !type:NestedSelector
            tableId: LootTableToolsCommon
          rolls: !type:RangeNumberSelector
            range: 2,6

