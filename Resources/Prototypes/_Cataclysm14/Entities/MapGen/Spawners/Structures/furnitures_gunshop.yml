#MARK: Metal Gun Rack Spawner
- type: entity
  name: random gunshop metal gun rack spawner
  id: EntitiesSpawnerStructureFurnituresGunshopGunRack
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: green
        scale: 1.3,1.3
      - state: rack
        sprite: _Cataclysm14/Structures/Furnitures/gun_rack_metal.rsi
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red
  - type: RandomSpawner
    prototypes:
    - StructureFurnitureGunRackMetalFilledGunshopRandom50
    - StructureFurnitureGunRackMetalFilledGunshopRandom25
    - StructureFurnitureGunRackMetalFilledGunshopRandom10
    - StructureFurnitureGunRackMetalLockedFilledGunshopRandom50
    - StructureFurnitureGunRackMetalLockedFilledGunshopRandom25
    - StructureFurnitureGunRackMetalLockedFilledGunshopRandom10
    chance: 1
    offset: 0.0
    # rarePrototypes:
    # - SpawnDungeonLootLockersGeneral
    # rareChance: 0.1

