#MARK: ToolsCommon - compact tool chest
- type: entity
  id: EntitiesSpawnerStructureFurnitureToolchestMobileCompactFilledToolsCommon
  suffix: EntitesSpawner][ToolsCommon
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: green
        scale: 1.3,1.3
      - sprite: _Cataclysm14/Structures/Furnitures/tool_chest_mobile.rsi
        state: mobile_tool_chest_compact
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red

  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: StructureFurnitureToolchestMobileCompactFilledToolsCommon
      - id: StructureFurnitureToolchestMobileCompactFilledToolsCommonRandom50
      - id: StructureFurnitureToolchestMobileCompactFilledToolsCommonRandom25
      - id: StructureFurnitureToolchestMobileCompactFilledToolsCommonRandom10

