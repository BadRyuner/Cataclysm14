#MARK: Metal Gun Rack Spawner
- type: entity
  name: random gunshop metal gun rack spawner
  id: EntitiesSpawnerStructureFurnituresGunshopGunRack
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: green
        scale: 1.3,1.3
      - state: rack
        sprite: _Cataclysm14/Structures/Furnitures/gun_rack_metal.rsi
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red

  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: StructureFurnitureGunRackMetalFilledGunshopRandom50
      - id: StructureFurnitureGunRackMetalFilledGunshopRandom25
      - id: StructureFurnitureGunRackMetalFilledGunshopRandom10
      - id: StructureFurnitureGunRackMetalLockedFilledGunshopRandom50
      - id: StructureFurnitureGunRackMetalLockedFilledGunshopRandom25
      - id: StructureFurnitureGunRackMetalLockedFilledGunshopRandom10

#MARK: Metal Ammo Shelf Spawner
- type: entity
  name: random gunshop metal shelf ammo spawner
  id: EntitiesSpawnerStructureFurnituresGunshopShelfAmmo
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: green
        scale: 1.3,1.3
      - sprite: _Cataclysm14/Structures/Furnitures/shelf_metal_storage.rsi
        state: icon
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red

  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: StructureFurnitureShelfMetalFilledGunshopAmmo
      - id: StructureFurnitureShelfMetalFilledGunshopAmmoRandom50
      - id: StructureFurnitureShelfMetalFilledGunshopAmmoRandom25
      - id: StructureFurnitureShelfMetalFilledGunshopAmmoRandom10
