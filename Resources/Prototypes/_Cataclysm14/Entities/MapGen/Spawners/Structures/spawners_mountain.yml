#MARK: MountainRockStone
- type: entity
  name: random mountain stone rock spawner
  id: EntitiesSpawnerMountainRockStone
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: green
        scale: 1.3,1.3
      - sprite: _Cataclysm14/Structures/RockWalls/rockwall_stone.rsi
        state: rock
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: StructureRockWallStone
        weight: 100
      -  !type:GroupSelector
        weight: 40
        children:
        - id: StructureRockWallStoneOreIron
          weight: 100
        - id: StructureRockWallStoneOreCopper
          weight: 100
        - id: StructureRockWallStoneOreCoal
          weight: 100
        - id: StructureRockWallStoneOreGold
          weight: 10

