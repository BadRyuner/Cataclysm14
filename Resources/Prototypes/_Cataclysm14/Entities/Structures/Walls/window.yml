- type: entity
  parent: Window
  id: StructureWindowCataGlassWallBase
  name: full window
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _Cataclysm14/Structures/Walls/glass_wall_transparent.rsi
  - type: Icon
    sprite: _Cataclysm14/Structures/Walls/glass_wall_transparent.rsi
  - type: IconSmooth
    key: walls
    base: glass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectShardGlassStack1:
            min: 1
            max: 15
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
