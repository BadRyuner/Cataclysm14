#MARK: T1 - Wood / Weak
# + soft rocks
- type: entity
  abstract: true
  parent: BaseWall
  id: BaseStructureWallCDDATierOne
  name: default wall
  description: Keeps the air in and the chimera out.
  components:
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:ChangeConstructionNodeBehavior
        node: Rebar
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ArmorThickness
    thickness: 3

