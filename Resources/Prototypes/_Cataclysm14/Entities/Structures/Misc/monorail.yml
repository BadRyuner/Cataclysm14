- type: entity
  id: StructureMiscTrackMonorailStraight
  parent: BaseStructure
  name: monorail track
  description: A massive hunk of steel that makes up a monorail track.
  components:
  - type: Climbable
  - type: Sprite
    sprite: _Cataclysm14/Structures/Misc/track_monorail_straight.rsi
    state: icon
  - type: Icon
    sprite: _Cataclysm14/Structures/Misc/track_monorail_straight.rsi
    state: icon
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.40,-0.30,0.40,0.45"
        density: 80
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
            params:
              volume: -6
        # - !type:SpawnEntitiesBehavior
        #   spawn:
        #     PartRodMetal1:
        #       min: 1
        #       max: 1
        - !type:DoActsBehavior
          acts: [ "Destruction" ]

- type: entity
  id: StructureMiscTrackMonorailIntersection
  parent: StructureMiscTrackMonorailStraight
  name: monorail intersection
  components:
  - type: Sprite
    sprite: _Cataclysm14/Structures/Misc/track_monorail_intersection.rsi
    state: icon
    noRot: true
  - type: Icon
    sprite: _Cataclysm14/Structures/Misc/track_monorail_intersection.rsi
    state: icon
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.40,-1.00,0.40,1.00"
        density: 80
        mask:
        - TableMask
        layer:
        - TableLayer
      fix2:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.80,-0.40,0.80,0.40"
        density: 80
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
            params:
              volume: -6
        # - !type:SpawnEntitiesBehavior
        #   spawn:
        #     PartRodMetal1:
        #       min: 1
        #       max: 1
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: Transform
    anchored: true
    noRot: true

- type: entity
  id: StructureMiscTrackMonorailExchanger
  parent: StructureMiscTrackMonorailIntersection
  name: monorail exchanger
  components:
  - type: Sprite
    sprite: _Cataclysm14/Structures/Misc/track_monorail_exchanger.rsi
    state: icon
  - type: Icon
    sprite: _Cataclysm14/Structures/Misc/track_monorail_exchanger.rsi
    state: icon
