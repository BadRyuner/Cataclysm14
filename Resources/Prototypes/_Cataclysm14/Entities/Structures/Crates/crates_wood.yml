#MARK: wood
- type: entity
  parent: StructureCrateBase
  id: StructureCrateWoodSmall
  name: small wooden crate
  components:
  - type: Sprite
    sprite: _Cataclysm14/Structures/Crates/crate_wood_small.rsi
    layers:
    - state: base
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Icon
    sprite: _Cataclysm14/Structures/Crates/crate_wood_small.rsi
    state: base
  - type: EntityStorage
    capacity: 10
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.1"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer

