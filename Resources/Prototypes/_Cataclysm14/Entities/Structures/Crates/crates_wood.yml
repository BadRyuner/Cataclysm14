- type: entity
  parent: StructureCrateBase
  id: StructureCrateShippingWood
  name: wooden shipping crate
  components:
  - type: Sprite
    offset: 0,0.5
    sprite: _Cataclysm14/Structures/Crates/crate_shipping_wood.rsi
    layers:
    - state: base
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Icon
    sprite: _Cataclysm14/Structures/Crates/crate_shipping_wood.rsi
    state: base
  - type: EntityStorage
    capacity: 50
    isCollidableWhenOpen: true
    airtight: true
    itemCanStoreMobs: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.2,0.35,0.5"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
