- type: entity
  id: StructureFurnitureWardrobeWood
  parent: StructureFurnitureBaseLarge
  name: wooden wardrobe
  description: Wooden wardrobe, can store things inside itself.
  components:
  - type: Sprite
    offset: 0,0.5
    sprite: _Cataclysm14/Structures/Furnitures/wardrobe_wood.rsi
    state: icon
    noRot: true
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectWoodPlankStack1:
            min: 2
            max: 8
          MaterialObjectWoodPanelStack1:
            min: 1
            max: 6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Storage
    grid:
    - 0,0,13,11
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Wooden
  - type: Anchorable
  - type: Rotatable
  # - type: Construction
  #   graph: Dresser
  #   node: dresser
  - type: Transform
    anchored: true
    noRot: true
