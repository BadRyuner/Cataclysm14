#MARK: Shelves
- type: entity
  id: StructureFurnitureShelfMetal
  parent: StructureFurnitureBaseLarge
  name: metal shelves
  description: Metal shelves, can store things inside itself.
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Cataclysm14/Structures/Furnitures/shelf_metal.rsi
    noRot: true
    layers:
    - state: icon
    - map: ["enum.StorageFillLayers.Fill"]
  - type: StorageFillVisualizer
    maxFillLevels: 6
    fillBaseName: fill
  - type: Damageable
    damageModifierSet: Metallic
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectMineralPlateSteelStack1:
            min: 3
            max: 6
          MaterialObjectMineralPipeSteelStack1:
            min: 1
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Storage
    grid:
    - 0,0,13,11
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Wooden
  - type: Anchorable
  - type: Rotatable
  # - type: Construction
  #   graph: Dresser
  #   node: dresser
  - type: Transform
    anchored: true
    noRot: true

