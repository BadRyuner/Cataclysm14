- type: entity
  name: small gas generator
  description: |-
    A flexible backup generator for powering a variety of equipment.
    Runs off solid plasma sheets and is rated for up to 25 kW.
  parent: PortableGeneratorSwitchableBase
  id: StructureApplianceGeneratorGasSmall
  suffix: Gas, 15 kW
  components:
    - type: Sprite
      sprite: _Cataclysm14/Structures/Appliances/generator_gas_small.rsi
      layers:
        - state: generator
          map: [ "enum.GeneratorVisualLayers.Body" ]
        - state: generator_on
          map: [ "enum.GeneratorVisualLayers.Unlit" ]
          visible: false
    - type: GenericVisualizer
      visuals:
        enum.GeneratorVisuals.Running:
          enum.GeneratorVisualLayers.Body:
            True: { state: generator_on }
            False: { state: generator }
          enum.GeneratorVisualLayers.Unlit:
            True: { visible: true }
            False: { visible: false }
    - type: Machine
      board: PortableGeneratorPacmanMachineCircuitboard
    - type: FuelGenerator
      minTargetPower: 1000
      maxTargetPower: 35000 # Mono
      targetPower: 15000
      optimalPower: 15000
      # 45 minutes at max output
      optimalBurnRate: 0.011111
      # a decent curve
      fuelEfficiencyConstant: 0.95
    - type: SolidFuelGeneratorAdapter
      fuelMaterial: FuelGradePlasma # Frontier: Plasma<FuelGradePlasma
      multiplier: 0.01
    - type: MaterialStorage
      storageLimit: 10000 # mono
      materialWhiteList: [Plasma, FuelGradePlasma] # Frontier: add FuelGradePlasma
    - type: PortableGenerator
      startChance: 0.8
    - type: UpgradePowerSupplier
      powerSupplyMultiplier: 1.25
      scaling: Exponential
    - type: GeneratorExhaustGas
      gasType: CarbonDioxide
      # 0.5 moles of gas for every sheet of plasma.
      moleRatio: 0.5
    - type: PowerMonitoringDevice
      group: Generator
      loadNodes:
        - output_hv
        - output_mv
      sprite: _Cataclysm14/Structures/Appliances/generator_gas_small.rsi
      state: generator
    - type: PowerSupplier
      supplyRampRate: 5000
      supplyRampTolerance: 1500
#    - type: MaterialStorageMagnetPickup # Frontier
#      range: 0.30 # Frontier
    - type: FuelGradeAdapter # Frontier
      inputMaterial: Plasma # Frontier
      outputMaterial: FuelGradePlasma # Frontier
    - type: Transform
      anchored: true
    - type: AmbientSound
      range: 15
      volume: 5
      sound:
        path: /Audio/Ambience/Objects/portable_scrubber.ogg