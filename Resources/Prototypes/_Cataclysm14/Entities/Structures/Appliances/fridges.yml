- type: entity
  id: StructureApplianceFridgeOld
  parent: StructureFurnitureBaseLarge
  name: old fridge
  description: An large fridge, can store things inside itself and make them not rot.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Sprite
    scale: 0.8,0.8
    drawdepth: Mobs
    sprite: _Cataclysm14/Structures/Appliances/fridge_old.rsi
    state: fridge
  - type: Damageable
    damageModifierSet: Metallic
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Storage
    grid:
    - 0,0,15,15
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Wooden
  - type: Anchorable
  - type: Rotatable
  - type: Construction
    graph: Dresser
    node: dresser
  - type: Transform
    anchored: true
  - type: AntiRottingContainer
