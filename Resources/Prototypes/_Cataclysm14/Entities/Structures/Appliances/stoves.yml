- type: entity
  id: StructureApplianceStoveWoodOld
  parent: StructureFurnitureBaseLarge
  name: old wood stove
  description: An old wood stove, can store things inside itself.
  components:
  - type: Sprite
    offset: 0,0.5
    sprite: _Cataclysm14/Structures/Appliances/stove_wood.rsi
    state: stove_old
    noRot: true
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Storage
    grid:
    - 0,0,4,6
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Wooden
  - type: Anchorable
  - type: Rotatable
  - type: Construction
    graph: Dresser
    node: dresser
  - type: Transform
    anchored: true
    noRot: true
