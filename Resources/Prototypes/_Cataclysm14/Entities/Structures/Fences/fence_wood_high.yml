- type: entity
  parent: StructureFurnitureBaseLarge
  id: StructureFenceWoodHigh
  name: high wooden fence
  description: Wooden piece of fencing. I hope there is babushka's garden behind it.
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/boxingpunch1.ogg"
  - type: Tag
    tags:
    - Wooden
  - type: Icon
    sprite: _Cataclysm14/Structures/Fences/fence_wood_high.rsi
    state: fence_0
  - type: Sprite
    noRot: true
    sprite: _Cataclysm14/Structures/Fences/fence_wood_high.rsi
    state: fence_0
  - type: IconSmooth
    key: Walls
    base: fence_
    mode: CardinalFlags
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Climbable
    delay: 2.0
  - type: Appearance
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.4,0.2,0.4"
        density: 50
        mask:
        - FullTileMask
        layer:
        - Opaque
        - MidImpassable
        - LowImpassable
        - BulletImpassable
