- type: entity
  id: DoorCataMetalReinforced
  name: reinforced metal door
  parent: BaseMaterialDoorNavMap
  description: A door, where will it lead?
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
    sprite: _Cataclysm14/Structures/Doors/metal_reinforced.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Door
    bumpOpen: false
    clickOpen: true
    closeTimeOne: 0.6
    closeTimeTwo: 1
    openTimeOne: 1
    openTimeTwo: 0.6
    openSound:
      path: /Audio/Effects/door_open.ogg
    closeSound:
      path: /Audio/Effects/door_close.ogg
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectMineralPlateSteelStack1:
            min: 2
            max: 4
          MaterialObjectMineralPipeSteelStack1:
            min: 1
            max: 3
          MaterialObjectDoorHingesStack1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: DoorCataWoodHouse
    node: DoorCataWoodHouse

- type: entity
  parent: BaseWallTierThree
  id: DoorCataMetalReinforcedLocked
  suffix: Locked
  name: reinforced metal door
  description: A door, where will it lead?
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
    sprite: _Cataclysm14/Structures/Doors/metal_reinforced.rsi
    state: closed
  - type: Icon
    sprite: _Cataclysm14/Structures/Doors/metal_reinforced.rsi
    state: closed
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectMineralPlateSteelStack1:
            min: 2
            max: 4
          MaterialObjectMineralPipeSteelStack1:
            min: 1
            max: 3
          MaterialObjectDoorHingesStack1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: InteractionPopup
    interactSuccessString: comp-window-knock
    messagePerceivedByOthers: comp-window-knock
    interactSuccessSound:
      path: /Audio/Effects/glass_knock.ogg
