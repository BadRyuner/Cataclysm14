- type: entity
  id: DoorCataWoodHouse
  name: wooden residential door
  parent: BaseMaterialDoorNavMap
  description: A door, where will it lead?
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
    sprite: _Cataclysm14/Structures/Doors/wood_house.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Door
    bumpOpen: false
    clickOpen: true
    closeTimeOne: 0.6
    closeTimeTwo: 1
    openTimeOne: 1
    openTimeTwo: 0.6
    openSound:
      path: /Audio/Effects/door_open.ogg
    closeSound:
      path: /Audio/Effects/door_close.ogg
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectWoodPlankStack1:
            min: 2
            max: 8
          MaterialObjectWoodPanelStack1:
            min: 0
            max: 2
          MaterialObjectDoorHingesStack1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: DoorCataWoodHouse
    node: DoorCataWoodHouse

- type: entity
  parent: BaseWallTierOne
  id: DoorCataWoodHouseBroken
  name: broken wooden residential door
  description: A shattered wooden door.
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
    sprite: _Cataclysm14/Structures/Doors/wood_house.rsi
    state: broken
  - type: Icon
    sprite: _Cataclysm14/Structures/Doors/wood_house.rsi
    state: broken
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectWoodPlankStack1:
            min: 2
            max: 6
          MaterialObjectWoodPanelStack1:
            min: 0
            max: 1
          MaterialObjectDoorHingesStack1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: BaseWallTierOne
  id: DoorCataWoodHouseLocked
  suffix: Locked
  name: wooden residential door
  description: A door, where will it lead?
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
    sprite: _Cataclysm14/Structures/Doors/wood_house.rsi
    state: closed
  - type: Icon
    sprite: _Cataclysm14/Structures/Doors/wood_house.rsi
    state: closed
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: InteractionPopup
    interactSuccessString: comp-window-knock
    messagePerceivedByOthers: comp-window-knock
    interactSuccessSound:
      path: /Audio/Effects/glass_knock.ogg
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectWoodPlankStack1:
            min: 2
            max: 8
          MaterialObjectWoodPanelStack1:
            min: 0
            max: 2
          MaterialObjectDoorHingesStack1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
