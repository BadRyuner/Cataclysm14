#MARK: Base
- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: BaseClothingShirt
  components:
  - type: Item
    storedOffset: 1,0
    shape:
    - 0,0,2,1
    size: Normal
    storedScale: 2.3

#MARK: Cargo
- type: entity
  abstract: true
  parent: [BaseClothingShirt, NFClothingBeltStorageBase, RecyclableItemClothBasic]
  id: BaseClothingShirtCargo
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,3,1

#MARK: Pocket
- type: entity
  abstract: true
  parent: [BaseClothingShirt, NFClothingBeltStorageBase, RecyclableItemClothBasic]
  id: BaseClothingShirtPocket
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,1

#MARK: Toggleable
- type: entity
  abstract: true
  parent: BaseClothingShirt
  id: BaseClothingShirtToggleable
  components:
  - type: ToggleableClothing
    requiredSlot: INNERCLOTHING
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container {}
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
