#MARK: -Hoodies-
  #MARK: Hoodie - white
    - type: entity
      parent: ClothingShirtBase
      id: ClothingShirtHoodieWhite
      name: white hoodie
      description: A warm hoodie, this one is colored in white.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Shirt/shirt_hoodie_greyscale.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Shirt/shirt_hoodie_greyscale.rsi
  #MARK: Hoodie - red
    - type: entity
      parent: ClothingShirtBase
      id: ClothingShirtHoodieRed
      name: red hoodie
      description: A warm hoodie, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Shirt/shirt_hoodie_greyscale.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Shirt/shirt_hoodie_greyscale.rsi
        clothingVisuals:
          jumpsuit:
          - state: equipped-INNERCLOTHING
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
