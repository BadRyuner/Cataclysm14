  id: ClothingShirtHoodieWhite
  name: hoodie (white)
  description: A warm large hoodie, very comfy.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shirt/shirt_hoodie_greyscale.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shirt/shirt_hoodie_greyscale.rsi

