#MARK: Yellow Cleansuit
- type: entity
  parent: BaseClothingShirtToggleable
  id: ClothingShirtCleansuitYellow
  name: cleansuit (yellow)
  description: "A suit that protects against contamination."
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shirt/shirt_cleansuit.rsi
    color: "#ffee2f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shirt/shirt_cleansuit.rsi
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: "#ffee2f"
      balaclava:
      - state: equipped-INNERCLOTHING
        color: "#ffee2f"
      - sprite: _Cataclysm14/Clothing/Head/Hoods/hood_cleansuit.rsi
        state: equipped-HELMET
        color: "#ffee2f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#ffee2f"
      right:
      - state: inhand-right
        color: "#ffee2f"
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.90
        Radiation: 0.01
  - type: GroupExamine
  - type: ToggleableClothing
    clothingPrototypes:
      balaclava: ClothingHoodCleansuitYellow

#MARK: Yellow Hood
- type: entity
