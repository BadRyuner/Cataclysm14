#MARK: Green
- type: entity
  parent: BaseClothingShirt
  id: ClothingShirtStrippedMariniereTeslnyashkaGreen
  name: marinière/telnyashka stripped shirt (green)
  description: A stripped shirt originally worn by french-normand sailors, now mainly used by russian military forces and navy-men.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shirt/shirt_mariniere-telnyashka.rsi
    layers:
    - state: shirt-icon
    - state: bits-icon
      color: "#5BAD46"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shirt/shirt_mariniere-telnyashka.rsi
    clothingVisuals:
      jumpsuit:
      - state: shirt-equipped-INNERCLOTHING
      - state: bits-equipped-INNERCLOTHING
        color: "#5BAD46"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#5BAD46"
      right:
      - state: inhand-right
        color: "#5BAD46"

