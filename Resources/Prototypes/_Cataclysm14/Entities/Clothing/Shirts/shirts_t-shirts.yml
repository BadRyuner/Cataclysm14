#MARK: -TShirts-
  #MARK: TShirt - white
    - type: entity
      parent: ClothingShirtBase
      id: ClothingShirtTShirtWhite
      name: white t-shirt
      description: A plain colored t-white, this one is colored in white.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Shirt/shirt_t-shirt_greyscale.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Shirt/shirt_t-shirt_greyscale.rsi
  #MARK: TShirt - red
    - type: entity
      parent: ClothingShirtBase
      id: ClothingShirtTShirtRed
      name: red t-shirt
      description: A plain colored t-shirt, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Shirt/shirt_t-shirt_greyscale.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Shirt/shirt_t-shirt_greyscale.rsi
        clothingVisuals:
          jumpsuit:
          - state: equipped-INNERCLOTHING
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
