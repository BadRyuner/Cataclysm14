  id: ClothingShirtTShirtWhite
  name: t-shirt (white)
  description: A plain colored t-shirt.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shirt/shirt_t-shirt_greyscale.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shirt/shirt_t-shirt_greyscale.rsi

