#MARK: Black
- type: entity
  parent: BaseClothingShirt
  id: ClothingShirtTracksuitBlack
  name: tracksuit shirt (blacl)
  description: An ample and breathable track shirt, has some branding line.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shirt/shirt_tracksuit.rsi
    layers:
    - state: shirt-icon
      color: "#141414"
    - state: bits-icon
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shirt/shirt_tracksuit.rsi
    clothingVisuals:
      jumpsuit:
      - state: shirt-equipped-INNERCLOTHING
        color: "#141414"
      - state: bits-equipped-INNERCLOTHING
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#141414"
      right:
      - state: inhand-right
        color: "#141414"

