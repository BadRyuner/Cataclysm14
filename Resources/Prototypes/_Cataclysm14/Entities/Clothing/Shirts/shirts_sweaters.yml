#MARK: white
- type: entity
  parent: BaseClothingShirt
  id: ClothingShirtSweaterWhite
  name: sweater (white)
  description: A comfy warm ample sweater.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shirt/shirt_sweater_greyscale.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shirt/shirt_sweater_greyscale.rsi

