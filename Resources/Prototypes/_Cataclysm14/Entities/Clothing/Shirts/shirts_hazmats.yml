#MARK: Yellow HazmatSuit
- type: entity
  parent: BaseClothingShirtToggleable
  id: ClothingShirtHazmatSuitYellow
  name: hazmat suit (yellow)
  description: "A suit that protects against contamination from HAZardous MATerials such as Chemical, Bioligical, Radiological and Nuclear threats moderatly"
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shirt/shirt_hazmat.rsi
    color: "#ffee2f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shirt/shirt_hazmat.rsi
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: "#ffee2f"
      balaclava:
      - state: equipped-INNERCLOTHING
        color: "#ffee2f"
      - sprite: _Cataclysm14/Clothing/Head/Hoods/hood_hazmat.rsi
        state: equipped-HELMET
        color: "#ffee2f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#ffee2f"
      right:
      - state: inhand-right
        color: "#ffee2f"
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.90
        Radiation: 0.01
  - type: GroupExamine
  - type: ToggleableClothing
    clothingPrototypes:
      balaclava: ClothingHoodHazmatSuitYellow

#MARK: Yellow Hood
- type: entity
  parent: BaseClothingBalaclava
  id: ClothingHoodHazmatSuitYellow
  name: hazmat suit hood (yellow)
  categories: [ HideSpawnMenu ]
  description: "A suit that protects against contamination from HAZardous MATerials such as Chemical, Bioligical, Radiological and Nuclear threats moderatly"
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Head/Hoods/hood_hazmat.rsi
    color: "#ffee2f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Head/Hoods/hood_hazmat.rsi
    clothingVisuals:
      balaclava:
      - state: equipped-HELMET
        color: "#ffee2f"
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.90
        Radiation: 0.01
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide

