  name: black ski mask balaclava
  description: A colored balaclava to make you look menacing.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/Balaclavas/balaclava_ski_mask.rsi
    color: "#1F1F1F"
  - type: Clothing
    sprite: _Mono/Clothing/Balaclavas/balaclava_ski_mask.rsi
    clothingVisuals:
