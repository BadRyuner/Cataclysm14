#MARK: Base Duty Belt
- type: entity
  parent: [NFClothingBeltStorageBase, ContentsExplosionResistanceBase]
  id: BaseClothingBeltDutyBelt
  abstract: true
  components:
  - type: StaticPrice
    price: 3000
    vendPrice: 5500
  - type: Sprite
    scale: 0.5,0.5
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Storage
    grid:
    - 0,0,7,1
  - type: Item
    shape:
    - 0,0,2,1
    storedScale: 3.5

#MARK: Police
- type: entity
  parent: BaseClothingBeltDutyBelt
  id: ClothingBeltDutyBeltPolice
  name: police duty belt (police)
  description: A belt with plenty of attach for equipment and pockets, used by law enforcement.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Belt/belt_duty_belt_any.rsi
    color: "#191931"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Belt/belt_duty_belt_any.rsi
    clothingVisuals:
      belt:
      - state: equipped-BELT
        color: "#191931"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#191931"
      right:
      - state: inhand-right
        color: "#191931"

