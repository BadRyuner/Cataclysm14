- type: entity
  parent: ClothingHelmetAttachmentBase
  id: ClothingHelmetAttachmentNVGPVS7Green
  name: PVS-7 night vision goggle (green phosphorus)
  description: A basic optoelectronics night vision goggles with high sensibility to flashes, worn in the helmet attachment slot.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/HelmetAttachment/nvg_PVS-7_green.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/HelmetAttachment/nvg_PVS-7_green.rsi
    clothingVisuals:
      helmetattachment:
      - state: equipped-HELMETATTACHMENT
  - type: NightVision
    color: "#85d573"
    flashDurationMultiplier: 3
    isEquipment: true
  - type: IdentityBlocker
    coverage: EYES

