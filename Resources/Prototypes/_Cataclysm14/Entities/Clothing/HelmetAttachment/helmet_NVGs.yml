#MARK: AN/PVS-7 green
- type: entity
  parent: BaseClothingHelmetAttachment
  id: ClothingHelmetAttachmentNVGPVS7Green
  name: AN/PVS-7 night vision monocular (green phosphorus)
  description: An old 3rd gen night vision monocular initially made to replace old AN/PVS-5 Vietnam-era NVGs.
