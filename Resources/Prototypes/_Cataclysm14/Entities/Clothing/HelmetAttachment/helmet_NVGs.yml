    sprite: _Cataclysm14/Clothing/HelmetAttachment/nvg_PVS-7_green.rsi
    state: icon
  - type: Clothing
    sprite: _Cataclysm14/Clothing/HelmetAttachment/nvg_PVS-7_green.rsi
  - type: NightVision
    isEquipment: true
    color: "#59BE66"

