
#tactical gloves

- type: entity
  parent: [ ClothingHandsGlovesCombat]
  id: ClothingHandsGlovesTacticalTan
  name: tactical gloves (tan)
  description: These tactical gloves are fireproof and shock resistant.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Hands/gloves_tactical_any.rsi
    color: "#d2B48C"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Hands/gloves_tactical_any.rsi
    clothingVisuals:
      gloves:
      - state: equipped-HAND
        color: "#d2B48C"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#d2B48C"
      right:
      - state: inhand-right
        color: "#d2B48C"
  - type: StaticPrice
    price: 1500
    vendPrice: 1950

