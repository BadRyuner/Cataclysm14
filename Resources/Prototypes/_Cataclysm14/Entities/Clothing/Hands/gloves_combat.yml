#MARK: tan
- type: entity
  parent: [ ClothingHandsGlovesCombat]
  id: ClothingHandsGlovesCombatTan
  name: combat gloves (tan)
  description: These combat gloves are fireproof and shock resistant.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Hands/gloves_combat_any.rsi
    color: "#AD8D62"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Hands/gloves_combat_any.rsi
    clothingVisuals:
      gloves:
      - state: equipped-HAND
        color: "#AD8D62"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#AD8D62"
      right:
      - state: inhand-right
        color: "#AD8D62"
  - type: StaticPrice
    price: 1500
    vendPrice: 1950

