#MARK: M88 Black
    - type: entity
      parent: BaseClothingHeadHelmetBulletproofM88
      id: ClothingHeadHelmetBulletproofM88Black
      name: M88 ballistic helmet (Black)
      description: A light ballistic helmet made for the US army.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Head/Helmets/helmet_bulletproof_M88_any.rsi
        layers:
        - state: helmet-icon
          color: "#1B1B1B"
        - state: bits-icon
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Head/Helmets/helmet_bulletproof_M88_any.rsi
        clothingVisuals:
          head:
          - state: helmet-equipped-HELMET
            color: "#1B1B1B"
          - state: bits-equipped-HELMET
      - type: Item
        inhandVisuals:
          left:
          - state: helmet-inhand-left
            color: "#1B1B1B"
          - state: bits-inhand-left
          right:
          - state: helmet-inhand-right
            color: "#1B1B1B"
          - state: bits-inhand-right

