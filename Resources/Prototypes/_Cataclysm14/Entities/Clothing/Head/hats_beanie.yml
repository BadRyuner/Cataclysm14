#MARK: black
- type: entity
  parent: BaseClothingHead
  id: ClothingHeadHatBeanieBlack
  name: beanie (black)
  description: A beanie or seamed cap, a small piece of cloth to protect your head from cold or just for fashion.
  components:
  - type: Sprite
    sprite: _Cataclysm14\Clothing\Head\Hats\hat_beanie_any.rsi
    color: "#3B3B3B"
  - type: Clothing
    sprite: _Cataclysm14\Clothing\Head\Hats\hat_beanie_any.rsi
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#3B3B3B"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#3B3B3B"
      right:
      - state: inhand-right
        color: "#3B3B3B"

