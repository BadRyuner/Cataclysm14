#MARK: Olive
- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHelmetEODBombsuitOlive
  name: EOD bombsuit helmet (olive)
  description: A heavy helmet designed to withstand the pressure generated by a bomb and any fragments the bomb may produce. Used by Explosive Ordnance Dispoal teams.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Head/SuitHeadpiece/bombsuit_helmet_EOD_olive.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Head/SuitHeadpiece/bombsuit_helmet_EOD_olive.rsi
  - type: IngestionBlocker
  - type: ExplosionResistance
    damageCoefficient: 0.80
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.50
        Piercing: 0.55
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide

