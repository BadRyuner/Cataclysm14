#MARK: Basic - Base / white
    - type: entity
      parent: BaseClothingHead
      id: ClothingHeadHelmetHardhatPlasticBase
      name: plastic hardhat (white)
      description: A light plastic hardhat to protect against accidents and shock, or a frying pan to the head.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Head/helmet_hardhat_greyscale.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Head/helmet_hardhat_greyscale.rsi
      - type: ExplosionResistance
        damageCoefficient: 0.8
      - type: Armor
        modifiers:
          coefficients:
            Blunt: 0.85
            Slash: 0.85
            Piercing: 0.85
      - type: HideLayerClothing
        slots:
        - Hair
        - Snout
        - HeadTop
        - HeadSide

#MARK: Yellow
    - type: entity
      parent: ClothingHeadHelmetHardhatPlasticBase
      id: ClothingHeadHelmetHardhatPlasticYellow
      name: plastic hardhat (yellow)
      components:
      - type: Sprite
        color: "#FFDE21"
      - type: Clothing
        clothingVisuals:
          head:
          - state: equipped-STRAP
          - state: equipped-HELMET
            color: "#FFDE21"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#FFDE21"
          right:
          - state: inhand-right
            color: "#FFDE21"

