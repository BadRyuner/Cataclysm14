#MARK: Basic - Base / white
    - type: entity
      parent: BaseClothingHead
      id: ClothingHeadHelmetFootballBase
      name: american football helmet (white)
      description: A light plastic hardhat to protect against accidents and shock, or a frying pan to the head.
      components:
      - type: Sprite
        sprite: _Cataclysm14\Clothing\Head\Helmets\helmet_protection_football_any.rsi
        layers:
        - state: bits-icon
        - state: helmet-icon
          color: "#FFFFFF"
      - type: Clothing
        sprite: _Cataclysm14\Clothing\Head\Helmets\helmet_protection_football_any.rsi
        clothingVisuals:
          head:
          - state: bits-equipped-HELMET
          - state: helmet-equipped-HELMET
            color: "#FFFFFF"
      - type: Item
        inhandVisuals:
          left:
          - state: bits-inhand-left
          - state: helmet-inhand-left
            color: "#FFFFFF"
          right:
          - state: bits-inhand-right
          - state: helmet-inhand-right
            color: "#FFFFFF"
      - type: ExplosionResistance
        damageCoefficient: 0.8
      - type: Armor
        modifiers:
          coefficients:
            Blunt: 0.85
            Slash: 0.85
            Piercing: 0.85
      - type: HideLayerClothing
        slots:
        - Hair
        - Snout
        - HeadTop
        - HeadSide

