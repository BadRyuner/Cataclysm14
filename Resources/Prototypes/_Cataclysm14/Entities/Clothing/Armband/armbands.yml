#custom armbands

- type: entity
  parent: BaseClothingArmArmband
  id: ClothingArmArmbandUNSA
  name: UNSA vanguard armband
  description: An armband bearing the flag of the Universal States of America, worn by Vanguards for indentification.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Armbands/armband_UNSA.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Armbands/armband_UNSA.rsi
    clothingVisuals:
      leftarmband:
      - state: equipped-ARMBANDLEFT
      rightarmband:
      - state: equipped-ARMBANDRIGHT

- type: entity
  parent: BaseClothingArmArmband
  id: ClothingArmArmbandUSA
  name: USA armband
  description: An armband bearing the flag of the United States of America, worn by true patriots.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Armbands/armband_USA.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Armbands/armband_USA.rsi
    clothingVisuals:
      leftarmband:
      - state: equipped-ARMBANDLEFT
      rightarmband:
      - state: equipped-ARMBANDRIGHT

