#MARK: -6B13-
  #MARK: 6B13 - flora
    - type: entity
      parent: ClothingOuterArmorBasic
      id: ClothingOuterBulletProofVest6B13Flora
      name: 6B13 body armor (flora)
      description: A medium kevlar vest made out of titanium. Capable of whistanding fairly large pistol calibers.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Vests/vest_bulletproof_6B13_flora.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Vests/vest_bulletproof_6B13_flora.rsi
      - type: Armor
        modifiers:
          coefficients:
            Blunt: 0.85
            Slash: 0.8
            Piercing: 0.65
            Heat: 0.85
            Caustic: 0.9 # Frontier
      - type: Tag  # Mono
        tags:
        - Kevlar
      - type: StaminaDamageResistance # Mono - Stamres
        coefficient: 0.8
      - type: ExplosionResistance
        damageCoefficient: 0.90
      - type: StaticPrice
        price: 8500
        vendPrice: 12000
