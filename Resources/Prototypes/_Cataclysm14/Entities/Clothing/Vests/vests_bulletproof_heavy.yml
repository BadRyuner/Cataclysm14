#MARK: NFM-THOR
    - type: entity
      parent: [ClothingBallisticPlateFrontBackSides, BaseClothingOuterBulletProofVest]
      id: ClothingOuterBulletProofVestTHOR
      name: NFM-THOR heavy ballistic vest
      suffix: Empty
      description: A heavy armor vest colored in tan. Made to resist intermediate calibers.
      components:
      - type: Item
        shape:
        - 0,0,4,5
      - type: Sprite
        scale: 0.80,0.80
        sprite: _Cataclysm14/Clothing/Vests/BulletproofVests/vest_bulletproof_NFM-THOR.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Vests/BulletproofVests/vest_bulletproof_NFM-THOR.rsi
      - type: Armor
        modifiers:
          coefficients:
            Blunt: 0.95
            Slash: 0.85
            Piercing: 0.35
            Heat: 0.85
            Caustic: 0.9
      - type: Tag
        tags:
        - Kevlar
      - type: StaminaDamageResistance
        coefficient: 0.8
      - type: ExplosionResistance
        damageCoefficient: 0.90
      - type: StaticPrice
        price: 6500
        vendPrice: 9000
      - type: Storage
        whitelist:
          tags:
          - ESAPIFrontBallisticPlateLevel6
          - ESBISideBallisticPlateLevel6
          - NESCO4400FrontBallisticPlateLevel6
          - AR500FrontBallisticPlateLevel3
          - SSAPISideBallisticPlateLevel5
          - CultLocustFrontBallisticPlateLevel5
          - MonocletePEFrontBallisticPlateLevel4

    - type: entity
      parent: ClothingOuterBulletProofVestTHOR
      id: ClothingOuterBulletProofVestTHORFilled
      suffix: Filled
      components:
      - type: StorageFill
        contents:
        - id: BallisticPlateSidesESBILevel6
        - id: BallisticPlateFrontNESCO4400Level6
        - id: BallisticPlateFrontNESCO4400Level6
        - id: BallisticPlateSidesESBILevel6

