#MARK: Canvas Aprons >>
    - type: entity
      parent: ClothingOuterArmorBase
      id: BaweClothingOuterApronCanvas
      abstract: true
      name: canvas apron
      description: A simple cloth apron of decent quality. Can't handle much on its own.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Vests/Aprons/vest_apron_canvas.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Vests/Aprons/vest_apron_canvas.rsi
      - type: Armor
        modifiers:
          coefficients:
            Slash: 0.95
            Piercing: 0.95
            Heat: 0.80
            Caustic: 0.80

#MARK: Black
    - type: entity
      parent: BaweClothingOuterApronCanvas
      id: ClothingOuterApronCanvasBlack
      name: black canvas apron
      components:
      - type: Sprite
        color: "#444444"
      - type: Clothing
        clothingVisuals:
          outerClothing:
          - state: equipped-OUTERCLOTHING
            color: "#444444"

#MARK: White
    - type: entity
      parent: BaweClothingOuterApronCanvas
      id: ClothingOuterApronCanvasWhite
      name: white canvas apron

