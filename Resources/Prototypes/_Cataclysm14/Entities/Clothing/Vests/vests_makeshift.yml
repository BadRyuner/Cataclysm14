      sprite: _Cataclysm14/Clothing/Vests/Makeshift/vest_armor_trafic_sign_stop.rsi
    - type: Clothing
      sprite: _Cataclysm14/Clothing/Vests/Makeshift/vest_armor_trafic_sign_stop.rsi
