#Base plates
  - type: entity
    parent: BaseItem
    abstract: true
    id: BallisticPlateFront
    name: ballistic frontal plate
    description: A lightweight protective plate made in the back or in the front.
    components:
    - type: Sprite
      state: icon
      scale: 0.75,0.75
    - type: Item
      size: Normal
      shape:
      - 0,0,1,1
    - type: Damageable
      damageContainer: Inorganic

  - type: entity
    parent: BaseItem
    abstract: true
    id: BallisticPlateFrontHeavy
    name: ballistic frontal plate
    description: A lightweight protective plate made in the back or in the front.
    components:
    - type: Sprite
      state: icon
      scale: 0.75,0.75
    - type: Item
      size: Normal
      shape:
      - 0,0,1,2
    - type: Damageable
      damageContainer: Inorganic

  - type: entity
    parent: BaseItem
    abstract: true
    id: BallisticPlateSides
    name: ballistic side plate
    description: A lightweight protective plate made to fit on the sides.
    components:
    - type: Sprite
      state: icon
      scale: 0.6,0.6
    - type: Item
      size: Normal
      shape:
      - 0,0,0,0
    - type: Damageable
      damageContainer: Inorganic

#MARK: T2
#MARK: T3
  - type: entity
    parent: BallisticPlateFront
    id: BallisticPlateFrontAR500Level3
    name: AR500 Legacy Plate ballistic plate (Level III)
    components:
    - type: ArmorPlateItem
      maxDurability: 100
      walkSpeedModifier: 0.99
      sprintSpeedModifier: 0.99
      staminaDamageMultiplier: 0.4
      bluntDamageMultiplier: 0.1
      slashDamageMultiplier: 0.1
    - type: Sprite
      sprite: _Cataclysm14/Clothing/BallisticPlates/ballistic_plate_front_grey_paper.rsi
      state: icon
    - type: Item
      sprite: _Cataclysm14/Clothing/BallisticPlates/ballistic_plate_front_grey_paper.rsi
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: Tag
      tags:
      - AR500FrontBallisticPlateLevel3

