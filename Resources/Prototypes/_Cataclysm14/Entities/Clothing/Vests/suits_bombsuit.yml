#MARK: Olive
- type: entity
  parent: ClothingOuterBaseLarge
  id: ClothingOuterSuitEODBombsuitOlive
  name: EOD bombsuit (olive)
  description: A heavy suit designed to withstand the pressure generated by a bomb and any fragments the bomb may produce. Used by Explosive Ordnance Dispoal teams.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Vests/Suits/bombsuit_EOD_olive.rsi
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Vests/Suits/bombsuit_EOD_olive.rsi
  - type: ClothingSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.6
  - type: ExplosionResistance
    damageCoefficient: 0.25
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.50
        Piercing: 0.55
        Heat: 0.75
  - type: GroupExamine
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon
  - type: StaminaDamageResistance
    coefficient: 0.3

