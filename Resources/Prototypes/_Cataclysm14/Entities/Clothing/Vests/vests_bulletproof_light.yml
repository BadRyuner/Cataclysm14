#MARK: -PACA-
    - type: entity
      parent: BaseClothingOuterBulletProofVest
      id: ClothingOuterBulletProofVestPACA
      name: PACA soft body armor
      description: A simple kevlar vest of decent quality. This one is a simple bulletproof vest made to resist low caliber rounds.
      components:
      - type: Item
        storedScale: 3
        shape:
        - 0,0,2,2
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Vests/BulletproofVests/vest_bulletproof_PACA.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Vests/BulletproofVests/vest_bulletproof_PACA.rsi
      - type: Armor
        modifiers:
          coefficients:
            Blunt: 0.95
            Slash: 0.85
            Piercing: 0.8
            Heat: 0.85
            Caustic: 0.9 # Frontier
      - type: Tag  # Mono
        tags:
        - Kevlar
      - type: StaminaDamageResistance # Mono - Stamres
        coefficient: 0.8
      - type: ExplosionResistance
        damageCoefficient: 0.90
      - type: StaticPrice
        price: 6500
        vendPrice: 9000
