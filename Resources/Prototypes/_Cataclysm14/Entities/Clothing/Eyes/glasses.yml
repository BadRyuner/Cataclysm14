#they are called *goggles* but count as glasses because.

#MARK: Ballistic eyewear
  #MARK: Ballistic red
    - type: entity
      parent: ClothingEyesBase
      id: ClothingEyesBallisticGogglesRed
      name: red ballistic goggles
      description: A pair of ballistic goggles with red lenses and black frame.
      components:
      - type: StaticPrice
        price: 7000
        vendPrice: 9000
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Eyes/eyes_ballistic_goggles_red.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Eyes/eyes_ballistic_goggles_red.rsi
      - type: Armor
        modifiers:
          coefficients:
            Heat: 0.95
      - type: GroupExamine
      - type: IdentityBlocker
        coverage: EYES
      - type: EyeProtection
        protectionTime: 5

    - type: entity
      parent: ClothingEyesBase
      id: ClothingEyesBallisticGlassesRed
      name: red ballistic glasses
      description: A pair of ballistic glasses with red lenses and black frame.
      components:
      - type: StaticPrice
        price: 7000
        vendPrice: 9000
