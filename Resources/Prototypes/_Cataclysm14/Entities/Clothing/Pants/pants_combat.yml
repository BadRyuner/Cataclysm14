#MARK: -CCE camos-
  #MARK: CCE base
    - type: entity
      parent: ClothingPantsBase
      id: ClothingPantsCombatCCE
      name: CCE combat pants
      description: Ripstop combat pants. It has the CCE central europe camo of the french army.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Pants/pants_CCE.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Pants/pants_CCE.rsi

    - type: entity
      parent: ClothingPantsCargoBase
      id: ClothingPantsCombatCCECargo
      name: CCE cargo combat pants
      description: Ripstop combat pants with large pockets. It has the CCE central europe camo of the french army.
