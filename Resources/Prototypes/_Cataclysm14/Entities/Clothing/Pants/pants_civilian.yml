#MARK: Jean - brown
    - type: entity
      parent: ClothingPantsPocketBase
      id: ClothingPantsJeansBrown
      name: brown jeans
      description: A pair of jeans, this one is colored in brown.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Pants/pants_jean_brown.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Pants/pants_jean_brown.rsi

#MARK: -Jeans-
  #MARK: Jean - red
    - type: entity
      parent: ClothingShirtBase
      id: ClothingPantsJeanRed
      name: red jean
      description: A warm jean, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Pants/pants_jean_greyscale.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Pants/pants_jean_greyscale.rsi
        clothingVisuals:
          jumpsuit:
          - state: equipped-INNERCLOTHING
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
