#MARK: Tan
- type: entity
  parent: BaseClothingPantsPocket
  id: ClothingPantsDutyMercenaryTan
  name: mercenary duty pants (tan)
  description: A pair of though duty pants with kneepads often used by private security, PMCs and mercenaries.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Pants/pants_duty_mercenary_any.rsi
    layers:
    - state: pants-icon
      color: "#d2B48C"
    - state: bits-icon
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Pants/pants_duty_mercenary_any.rsi
    clothingVisuals:
      pants:
      - state: pants-equipped-PANTS
        color: "#d2B48C"
      - state: bits-equipped-PANTS
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#d2B48C"
      right:
      - state: inhand-right
        color: "#d2B48C"

