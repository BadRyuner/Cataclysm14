#MARK: -Jeans-
  #MARK: Jeans - blue
    - type: entity
      parent: ClothingPantsBase
      id: ClothingPantsJeansBlue
      name: blue jeans
      description: A warm jeans, this one is colored in blue.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Pants/pants_jeans_greyscale.rsi
        color: "#6F8FAF"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Pants/pants_jeans_greyscale.rsi
        clothingVisuals:
          pants:
          - state: equipped-PANTS
            color: "#6F8FAF"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#6F8FAF"
          right:
          - state: inhand-right
            color: "#6F8FAF"
