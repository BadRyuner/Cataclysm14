#MARK: Black
- type: entity
  parent: BaseClothingPants
  id: ClothingPantsTracksuitBlack
  name: tracksuit pants (black)
  description: A pair of ample and breathable track pants, has some branding line.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Pants/pants_tracksuit.rsi
    layers:
    - state: pants-icon
      color: "#141414"
    - state: bits-icon
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Pants/pants_tracksuit.rsi
    clothingVisuals:
      pants:
      - state: pants-equipped-PANTS
        color: "#141414"
      - state: bits-equipped-PANTS
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#141414"
      right:
      - state: inhand-right
        color: "#141414"

