#MARK: Tan
- type: entity
  parent: BaseClothingPantsPocket
  id: ClothingPantsDutyTan
  name: duty pants (tan)
  description: A pair of though duty pants made for work or everyday wear for middle-aged men, and perhapse private security.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Pants/pants_duty_any.rsi
    layers:
    - state: pants-icon
      color: "#d2B48C"
    - state: bits-icon
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Pants/pants_duty_any.rsi
    clothingVisuals:
      pants:
      - state: pants-equipped-PANTS
        color: "#d2B48C"
      - state: bits-equipped-PANTS
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#d2B48C"
      right:
      - state: inhand-right
        color: "#d2B48C"

