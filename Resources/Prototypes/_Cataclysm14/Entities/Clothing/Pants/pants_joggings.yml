#MARK: -TShirts-
  #MARK: TShirt - red
    - type: entity
      parent: ClothingPantsBase
      id: ClothingPantsJoggingsRed
      name: red joggings
      description: A plain colored joggings, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Pants/pants_joggings_greyscale.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Pants/pants_joggings_greyscale.rsi
        clothingVisuals:
          pants:
          - state: equipped-PANTS
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
