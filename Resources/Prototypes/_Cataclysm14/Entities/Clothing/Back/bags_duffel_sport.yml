#MARK: -Sport duffels-
  #MARK: Sport duffel - red
    - type: entity
      parent: ClothingBackpackDuffelSportBase
      id: ClothingBackpackDuffelSportRed
      name: red sports duffelbag
      description: A plain colored sports duffelbag, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Back/backpack_duffel_sport_greyscale.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Back/backpack_duffel_sport_greyscale.rsi
        clothingVisuals:
          back:
          - state: equipped-BACKPACK
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
