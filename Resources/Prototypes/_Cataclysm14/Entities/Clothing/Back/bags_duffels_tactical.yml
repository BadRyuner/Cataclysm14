#MARK: Tan
- type: entity
  parent: BaseClothingBackpackDuffelTactical
  id: ClothingBackpackDuffelTacticalTan
  name: tactical duffelbag (tan)
  description: One heavy sack. Some effort was put in to make it lighter to no avail.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Back/backpack_duffel_tactical_any.rsi
    color: "#cdac7f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Back/backpack_duffel_tactical_any.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
        color: "#cdac7f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#cdac7f"
      right:
      - state: inhand-right
        color: "#cdac7f"

