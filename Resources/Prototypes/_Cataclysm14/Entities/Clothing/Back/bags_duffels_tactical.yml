#custom colored tactical duffels
#their hex code is that of helmet covers but darkenned by 5% because it looked like shit otherwise)
- type: entity
  parent: ClothingBackpackDuffelTacticalBase
  id: ClothingBackpackDuffelTacticalTan
  name: tan tactical duffel
  description: One heavy sack. Some effort was put in to make it lighter to no avail.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Back/backpack_duffel_tactical_greyscale.rsi
    color: "#cdac7f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Back/backpack_duffel_tactical_greyscale.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
        color: "#cdac7f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#cdac7f"
      right:
      - state: inhand-right
        color: "#cdac7f"

