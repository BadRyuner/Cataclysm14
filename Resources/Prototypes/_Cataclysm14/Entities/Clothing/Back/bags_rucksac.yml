 #MARK: Tan
- type: entity
  parent: BaseClothingBackpackRucksack
  id: ClothingBackpackRucksackTan
  name: rucksack (tan)
  description: A large military backpack with a main pocket and a few small ones.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Back/backpack_rucksack_any.rsi
    color: "#cdac7f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Back/backpack_rucksack_any.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
        color: "#cdac7f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#cdac7f"
      right:
      - state: inhand-right
        color: "#cdac7f"

