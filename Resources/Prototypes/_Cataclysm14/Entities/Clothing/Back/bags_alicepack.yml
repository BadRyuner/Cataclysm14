
  #MARK: Tan
- type: entity
  parent: BaseClothingBackpackAlicePack
  id: ClothingBackpackAlicePackTan
  name: alicepack (tan)
  description: A large military backpack with a main pocket and multiple smaller ones.
  components:
  - type: Sprite
    scale: 0.5,0.5
    sprite: _Cataclysm14/Clothing/Back/backpack_alicepack_any.rsi
    color: "#cdac7f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Back/backpack_alicepack_any.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
        color: "#cdac7f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#cdac7f"
      right:
      - state: inhand-right
        color: "#cdac7f"

