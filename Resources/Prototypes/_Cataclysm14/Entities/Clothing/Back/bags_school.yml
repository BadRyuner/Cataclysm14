#MARK: -PupilBags-
  #MARK: PupilBag - white
    - type: entity
      parent: ClothingBackpackSchoolBagBase
      id: ClothingBackpackSchoolBagWhite
      name: white school backpack
      description: A plain colored t-white, this one is colored in white.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Back/backpack_bag_school_any.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Back/backpack_bag_school_any.rsi
  #MARK: PupilBag - red
    - type: entity
      parent: ClothingBackpackSchoolBagBase
      id: ClothingBackpackSchoolBagRed
      name: red school backpack
      description: A plain colored school backpack, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Back/backpack_bag_school_any.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Back/backpack_bag_school_any.rsi
        clothingVisuals:
          back:
          - state: equipped-BACKPACK
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
