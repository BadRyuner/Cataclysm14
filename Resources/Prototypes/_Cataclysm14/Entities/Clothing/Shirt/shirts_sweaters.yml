#MARK: -Sweaters-
  #MARK: Sweater - white
    - type: entity
      parent: ClothingShirtBase
      id: ClothingShirtSweaterWhite
      name: white sweater
      description: A warm sweater, this one is colored in white.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Shirt/shirt_sweater_greyscale.rsi
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Shirt/shirt_sweater_greyscale.rsi
  #MARK: Sweater - red
    - type: entity
      parent: ClothingShirtBase
      id: ClothingShirtSweaterRed
      name: red sweater
      description: A warm sweater, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Shirt/shirt_sweater_greyscale.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Shirt/shirt_sweater_greyscale.rsi
        clothingVisuals:
          jumpsuit:
          - state: equipped-INNERCLOTHING
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
