- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: ClothingShirtBase

#Version with large pockets
- type: entity
  abstract: true
  parent: [ClothingShirtBase, NFClothingBeltStorageBase, RecyclableItemClothBasic]
  id: ClothingShirtCargoBase
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,3,1
  - type: Item
    size: Huge

#Version with small pockets
- type: entity
  abstract: true
  parent: [ClothingShirtBase, NFClothingBeltStorageBase, RecyclableItemClothBasic]
  id: ClothingShirtPocketBase
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,1
  - type: Item
    size: Huge
