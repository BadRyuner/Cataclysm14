- type: entity
  parent: ClothingShoesBootsJack
  id: ClothingShoesBootsSWATTan
  name: tan SWAT boots
  description: A pair of SWAT boots for when you want to turn up the heat.
  components:
  - type: StaticPrice
    price: 900
    vendPrice: 1470
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shoes/boots_combat_swat_greyscale.rsi
    color: "#cdac7f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shoes/boots_combat_swat_greyscale.rsi
    clothingVisuals:
      shoes:
      - state: equipped-FEET
        color: "#cdac7f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#cdac7f"
      right:
      - state: inhand-right
        color: "#cdac7f"

