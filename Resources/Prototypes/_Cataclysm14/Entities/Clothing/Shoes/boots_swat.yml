#MARK: tan
- type: entity
  parent: BaseClothingShoes
  id: ClothingShoesBootsSWATBootsTan
  name: SWAT boots (tan)
  description: A pair of SWAT boots for when you want to turn up the heat.
  components:
  - type: StaticPrice
    price: 900
    vendPrice: 1470
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shoes/boots_combat_swat_any.rsi
    color: "#AD8D62"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shoes/boots_combat_swat_any.rsi
    clothingVisuals:
      shoes:
      - state: equipped-FEET
        color: "#AD8D62"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#AD8D62"
      right:
      - state: inhand-right
        color: "#AD8D62"

