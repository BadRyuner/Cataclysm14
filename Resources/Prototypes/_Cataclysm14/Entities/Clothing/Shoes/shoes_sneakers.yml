#MARK: -TShirts-
  #MARK: TShirt - red
    - type: entity
      parent: ClothingShoesBase
      id: ClothingShoesSneakersRed
      name: red sneakers
      description: A pair of colored sneakers, this one is colored in red.
      components:
      - type: Sprite
        sprite: _Cataclysm14/Clothing/Shoes/shoes_sneakers_greyscale.rsi
        color: "#9E1A1A"
      - type: Clothing
        sprite: _Cataclysm14/Clothing/Shoes/shoes_sneakers_greyscale.rsi
        clothingVisuals:
          shoes:
          - state: equipped-FEET
            color: "#9E1A1A"
      - type: Item
        inhandVisuals:
          left:
          - state: inhand-left
            color: "#9E1A1A"
          right:
          - state: inhand-right
            color: "#9E1A1A"
