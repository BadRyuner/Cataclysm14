#MARK: tan
- type: entity
  parent: ClothingShoesBootsJack
  id: ClothingShoesBootsWorkbootsTan
  name: workboots (tan)
  description: A pair of workboots for when heavy duty work is required.
  components:
  - type: StaticPrice
    price: 900
    vendPrice: 1470
  - type: Sprite
    sprite: _Cataclysm14/Clothing/Shoes/boots_workboots_greyscale.rsi
    color: "#cdac7f"
  - type: Clothing
    sprite: _Cataclysm14/Clothing/Shoes/boots_workboots_greyscale.rsi
    clothingVisuals:
      shoes:
      - state: equipped-FEET
        color: "#cdac7f"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#cdac7f"
      right:
      - state: inhand-right
        color: "#cdac7f"

