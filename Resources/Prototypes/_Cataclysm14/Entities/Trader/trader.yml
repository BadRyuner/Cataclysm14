- type: entity
  id: BaseTrader
  name: vending machine
  description: Just add capitalism!
  abstract: true
  placement:
    mode: PlaceFree
  components:
  - type: Clickable
  - type: Animateable
  - type: Sprite
    sprite: Structures/Machines/VendingMachines/empty.rsi
    snapCardinals: true
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.2
    sprintSpeedModifier: 0.2
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Breakage"]
      - !type:EjectVendorItems
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: ActivatableUI
    key: enum.VendingMachineUiKey.Key
  - type: UserInterface
    interfaces:
      enum.VendingMachineUiKey.Key:
        type: VendingMachineBoundUserInterface
  - type: IntrinsicRadioReceiver
  # - type: PointLight
  #   enabled: false
  #   castShadows: false
  #   radius: 1.5
  - type: Actions
  - type: StaticPrice
    price: 1000 # Frontier: 100<1000
  - type: Appearance
  - type: LanguageSpeaker # Einstein Engines - Languages
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic
    - RobotTalk
    understands:
    - TauCetiBasic
    - RobotTalk
  # Frontier: vending machine modifications
  - type: MarketModifier
    mod: 10
  - type: VendingMachine
    pack: EmptyVendingMachineInventory # Mandatory, use empty inventory
    taxAccounts:
      Frontier: 0.0
      Nfsd: 0.0
      Medical: 0.0
    cashSlot:
      whitelist:
        components:
        - Cash
    cashSlotName: cash_slot
    currencyStackType: Credit
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      cash_slot: !type:ContainerSlot
  # End Frontier

- type: entity
  parent: BaseTrader
  id: TraderWarsawPact
  name: warsaw pact armament trader
  description: Strength and muscle and jungle work.
  components:
  - type: VendingMachine
    pack: WeaponryWorksVendPOIMercInventory
    offState: trader
  - type: Sprite
    sprite: _Cataclysm14/Trader/warsaw_trader.rsi
    drawdepth: SmallObjects
    layers:
    - state: trader
      map: ["enum.VendingMachineVisualLayers.Base"]
  - type: Advertise
    pack: CondimentVendAds
  - type: SpeakOnUIClosed
    pack: GenericVendGoodbyes
