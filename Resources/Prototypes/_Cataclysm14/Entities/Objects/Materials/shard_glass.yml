#MARK: Material
- type: stack
  id: StackShardGlass
  name: nail
  icon: { sprite: /Textures/_Cataclysm14/Objects/Materials/shard_glass.rsi, state: stack_3 }
  spawn: MaterialObjectShardGlassStack1
  maxCount: 100

- type: material
  id: MaterialShardGlass
  stackEntity: MaterialObjectShardGlassStack1
  name: materials-glass-shard
  unit: materials-unit-sheet
  icon: { sprite: /Textures/_Cataclysm14/Objects/Materials/shard_glass.rsi, state: stack_3 }
  color: "#000000"
  price: 0.1 # per material unit

- type: entity
  categories: [ HideSpawnMenu ]
  parent: MaterialBase
  id: MaterialObjectShardGlass
  name: glass shards
  description: A bunch of sharp broken glass shards, could be used as a weapon if you hit hard enough.
  suffix: Full
  components:
  - type: Sprite
    scale: 0.6,0.6
    sprite: _Cataclysm14/Objects/Materials/shard_glass.rsi
    state: stack_3
    layers:
    - state: stack_3
      map: ["base"]
  - type: Tag
    tags:
    - Sheet
  - type: Item
    sprite: _Cataclysm14/Objects/Materials/shard_glass.rsi
    size: Tiny
  - type: Stack
    stackType: StackShardGlass
    count: 100
    baseLayer: base
    layerStates:
    - stack_1
    - stack_2
    - stack_3
  - type: Material
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      MaterialShardGlass: 1
  - type: UserInterface
    interfaces:
      enum.StackCustomSplitUiKey.Key:
        type: StackCustomSplitBoundUserInterface

  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Slash: 3.5
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        layer:
        - LowImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 30
        mask:
        - ItemMask
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 2
  # - type: Tag
  #   tags:
  #   - Trash
  # - type: SpaceGarbage
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Glass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: StepTrigger
    intersectRatio: 0.2
  - type: PreventableStepTrigger
  - type: Slippery
    slipSound:
      path: /Audio/Effects/glass_step.ogg
    slipData:
      launchForwardsMultiplier: 0
  - type: TriggerOnStepTrigger
  - type: DamageUserOnTrigger
    damage:
      types:
        Piercing: 5
  - type: StaticPrice
    price: 0
  - type: Scalpel # Shitmed
    speed: 0.45
  - type: SurgeryTool # Shitmed
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_Shitmed/Medical/Surgery/scalpel2.ogg

#MARK: Stacks
- type: entity
  parent: MaterialObjectShardGlass
  id: MaterialObjectShardGlassStack1
  suffix: 1
  components:
  - type: Stack
    count: 1

