- type: stack
  id: StackLifeEssence
  name: nail
  icon: { sprite: /Textures/_Cataclysm14/Objects/Materials/life_essence.rsi, state: life_essence_100 }
  spawn: MaterialObjectLifeEssenceStack1
  maxCount: 100

- type: material
  id: MaterialLifeEssence
  stackEntity: MaterialObjectLifeEssenceStack1
  name: materials-life-essence
  unit: materials-unit-sheet
  icon: { sprite: /Textures/_Cataclysm14/Objects/Materials/life_essence.rsi, state: life_essence_100 }
  color: "#000000"
  price: 0.1 # 10/sheet

- type: entity
  categories: [ HideSpawnMenu ]
  parent: MaterialBase
  id: MaterialObjectLifeEssence
  name: life essence
  description: A solid to the touch yet non-physical substance, seems to combine when you stick some together.
  suffix: Full
  components:
  - type: Sprite
    scale: 0.6,0.6
    sprite: _Cataclysm14/Objects/Materials/life_essence.rsi
    state: life_essence_100
    layers:
    - state: life_essence_100
      map: ["base"]
  - type: Tag
    tags:
    - Sheet
  - type: Item
    sprite: _Cataclysm14/Objects/Materials/life_essence.rsi
    heldPrefix: life_essence
  - type: Stack
    stackType: StackLifeEssence
    count: 100
    baseLayer: base
    layerStates:
    - life_essence_1
    - life_essence_20
    - life_essence_50
    - life_essence_100
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [1, 20, 50, 100]
  - type: Material
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      MaterialLifeEssence: 1
  - type: UserInterface
    interfaces:
      enum.StackCustomSplitUiKey.Key:
        type: StackCustomSplitBoundUserInterface
  - type: PointLight
    enabled: true
    color: "#FAF881"
    radius: 1.10
    energy: 125.0
    offset: 0.015,0

