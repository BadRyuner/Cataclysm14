- type: stack
  id: StackWoodBeam
  name: nail
  icon: { sprite: /Textures/_Cataclysm14/Objects/Materials/wood_beam.rsi, state: stack_25 }
  spawn: MaterialObjectWoodBeamStack1
  maxCount: 25

- type: material
  id: MaterialWoodBeam
  stackEntity: MaterialObjectWoodBeamStack1
