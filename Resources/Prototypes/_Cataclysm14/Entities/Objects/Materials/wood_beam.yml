    scale: 0.85,0.7
    sprite: _Cataclysm14/Objects/Materials/wood_beam.rsi
    state: state
    layers:
    - state: stack_25
      map: ["base"]
  - type: Tag
    tags:
    - Sheet
  - type: Item
    sprite: _Cataclysm14/Objects/Materials/wood_beam.rsi
    heldPrefix: nail
  - type: Stack
    stackType: StackWoodBeam
    count: 100
    baseLayer: base
    layerStates:
    - stack_1
    - stack_2
    - stack_10
    - stack_25
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [1, 2, 10, 25]
  - type: Material
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      MaterialWoodBeam: 1
  - type: UserInterface
    interfaces:
      enum.StackCustomSplitUiKey.Key:
        type: StackCustomSplitBoundUserInterface

- type: entity
  parent: MaterialObjectWoodBeam
