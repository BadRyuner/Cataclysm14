- type: entity
  id: WeaponShotgunMossberg500Base
  name: Mossberg 500 (12 gauge)
  description: An old yet faithful design, and a favorite among hunters. Uses 12 gauge shotgun shells.
  parent:
    - BaseWeaponShotgun
    - BaseGunWieldable
  abstract: true
  components:
    - type: Item
      size: Large
      sprite: _Cataclysm14/Objects/Weapons/Guns/Shotguns/Mossberg-500_64x64.rsi
      shape:
        - 0,0,5,1
      storedScale: 2.5
    - type: Sprite
      scale: 0.55,0.55
      sprite: _Cataclysm14/Objects/Weapons/Guns/Shotguns/Mossberg-500_64x32.rsi
    - type: Clothing
      clothingVisuals:
        slingfront:
          - state: equipped-SLINGFRONT
        suitstorage:
          - state: equipped-SUITSTORAGE
      slots:
        - slingfront
        - suitstorage
      sprite: _Cataclysm14/Objects/Weapons/Guns/Shotguns/Mossberg-500_64x32.rsi
    - type: GunRequiresWield
    - type: Gun
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
        params:
          pitch: 0.7
          volume: 15
          variation: 0.1
      fireRate: 1.4
    - type: GunSpreadModifier
      spread: 0.7
    - type: Tag
      tags:
        - WeaponShotgunMossberg500
    - type: BallisticAmmoProvider
      capacity: 6

- type: entity
  id: WeaponShotgunMossberg500Empty
  suffix: Empty
  parent: WeaponShotgunMossberg500Base
  components:
    - type: BallisticAmmoProvider
      proto: null

- type: entity
  id: WeaponShotgunMossberg500FilledBuckshot
  suffix: Buckshot
  parent: WeaponShotgunMossberg500Base
  components:
    - type: BallisticAmmoProvider
      proto: ShellShotgun12GaugeBuckshot

- type: entity
  id: WeaponShotgunMossberg500FilledBeanbag
  suffix: Beanbag
  parent: WeaponShotgunMossberg500Base
  components:
    - type: BallisticAmmoProvider
      proto: ShellShotgun12GaugeBeanbag
