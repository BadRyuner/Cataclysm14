  id: WeaponSubMachineGunMP5SDModSierraFilled30rdEmpty
  suffix: Empty - 30rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine9x19mmMP5_30rdEmpty

