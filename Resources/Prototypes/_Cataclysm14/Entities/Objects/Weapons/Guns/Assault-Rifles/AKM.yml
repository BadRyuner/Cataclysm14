- type: entity
  name: AKM (7.62x39mm)
  parent: BaseWeaponRifle
  id: WeaponAssaultRifleAKM
  description: An old Soviet Era rifle. Uses 7.62x39mm ammo. When the chaos began to spread across the Earth, few weapons were as reliable as the AKM.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/AKM_64x32.rsi
    scale: 0.80, 0.80
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/AKM_32x32.rsi
    size: Huge
    shape:
    - 0,0,4,1
  - type: Clothing
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/AKM_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    fireRate: 5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rifle2.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine7.62x39mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine7.62x39mmFMJ
            - Magazine7.62x39mmLowCapacityFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge7.62x39mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge7.62x39mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_okp.rsi
      state: all
