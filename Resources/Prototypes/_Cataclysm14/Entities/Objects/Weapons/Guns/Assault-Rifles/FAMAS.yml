- type: entity
  name: GIAT FAMAS-G2 (5.56x45mm NATO)
  parent: BaseWeaponRifle
  id: WeaponAssaultRifleFAMAS_G2Base
  description: A modern polymer bullpup assault rifle made by the GIAT group and used by the french army. Chambered in 5.56x45mm NATO.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/FAMAS-G2_64x32.rsi
    scale: 0.80, 0.80
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/FAMAS-G2_32x32.rsi
    size: Huge
    shape:
    - 0,0,3,1
    storedScale: 1.6
  - type: Clothing
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/FAMAS-G2_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    selectedMode: Burst
    availableModes:
    - Burst
    - SemiAuto
    - FullAuto
    burstCooldown: 0.3
    burstFireRate: 12
    shotsPerBurst: 3
    fireRate: 9
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mk_fire.ogg
      params:
        volume: 10
        variation: 0.1
        pitch: 0.8
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5.56x45mmFAMAS25rdEmpty
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine5.56x45mmSTANAGCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge5.56x45mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge5.56x45mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

- type: entity
  parent: WeaponAssaultRifleFAMAS_G2Base
  id: WeaponAssaultRifleFAMAS_G2FilledFAMAS25rdEmpty
  suffix: Empty - FAMAS 25rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5.56x45mmFAMAS25rdEmpty

- type: entity
  parent: WeaponAssaultRifleFAMAS_G2Base
  id: WeaponAssaultRifleFAMAS_G2FilledFAMAS25rdFMJ
  suffix: FMJ - FAMAS 25rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5.56x45mmFAMAS25rdFMJ
