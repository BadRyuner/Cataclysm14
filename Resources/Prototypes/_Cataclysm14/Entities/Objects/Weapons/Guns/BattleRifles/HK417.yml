- type: entity
  id: WeaponBattleRifleHK417Base
  name: HK417 (7,62x51mm NATO)
  description: A modern battle rifle made by the german company Heckler & Koch. Chambered in 7,62x51mm NATO .
  parent: BaseWeaponRifle
  abstract: true
  components:
    - type: Sprite
      scale: 0.60, 0.60
      sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/HK417_64x32.rsi
      layers:
        - state: base
          map:
            - enum.GunVisualLayers.Base
        - state: mag-0
          map:
            - enum.GunVisualLayers.Mag
    - type: Item
      size: Large
      sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/HK417_32x32.rsi
      shape:
        - 0,0,5,1
      storedScale: 2
    - type: Clothing
      clothingVisuals:
        slingfront:
          - state: equipped-SLINGFRONT
        suitstorage:
          - state: equipped-SUITSTORAGE
      sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/HK417_32x32.rsi
    - type: Gun
      soundGunshot:
        path: /Audio/_NF/Weapons/Guns/Gunshots/rifle.ogg
        params:
          volume: 15
          variation: 0.1
          pitch: 0.85
      fireRate: 9
    - type: ChamberMagazineAmmoProvider
      soundRack:
        path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: Magazine7,62x51mmSTANAG20rdEmpty
          insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
          priority: 2
          whitelist:
            tags:
              - Magazine7,62x51mmSTANAGCompatible
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: Cartridge7,62x51mmFMJ
          priority: 1
          whitelist:
            tags:
              - Cartridge7,62x51mm
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot {}
    - type: MagazineVisuals
      magState: mag
      steps: 1
      zeroVisible: true
    - type: Appearance
    - type: WieldedCrosshair
      rsi:
        sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
        state: all

- type: entity
  id: WeaponBattleRifleHK417FilledSTANAG20rdEmpty
  suffix: Empty- STANAG 20rd
  parent: WeaponBattleRifleHK417Base
  components:
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: Magazine7,62x51mmSTANAG20rdEmpty

- type: entity
  id: WeaponBattleRifleHK417FilledSTANAG20rdFMJ
  suffix: FMJ - STANAG 20rd
  parent: WeaponBattleRifleHK417Base
  components:
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: Magazine7,62x51mmSTANAG20rdFMJ
