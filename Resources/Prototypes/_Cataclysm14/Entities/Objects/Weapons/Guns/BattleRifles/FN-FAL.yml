#MARK: Base
- type: entity
  name: FN FAL (7,62x51mm NATO)
  parent: BaseWeaponRifle
  id: WeaponBattleRifleFnFalBase
  abstract: true
  description: A somewhat modern battle rifle made by the belgian company FN Herstal and used by armies throughout the world, nicknamed "the right arm of the free world". Chambered in 7,62x51mm NATO .
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/FN-FAL_64x32.rsi
    scale: 0.60, 0.60
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/FN-FAL_32x32.rsi
    size: Large
    shape:
    - 0,0,5,1
    storedScale: 2
  - type: Clothing
    sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/FN-FAL_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    fireRate: 9
    soundGunshot:
      path: /Audio/_Harmony/Weapons/Guns/Gunshots/hristov_fire_alt.ogg
      params:
        volume: 15
        variation: 0.1
        pitch: 2.2
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine7,62x51mmSTANAG20rdEmpty
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine7,62x51mmSTANAGCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge7,62x51mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge7,62x51mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

#MARK: STANAG 20rd Empty
- type: entity
  parent: WeaponBattleRifleFnFalBase
  id: WeaponBattleRifleFnFalFilledSTANAG20rdEmpty
  suffix: Empty- STANAG 20rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine7,62x51mmSTANAG20rdEmpty

#MARK: STANAG 20rd FMJ
- type: entity
  parent: WeaponBattleRifleFnFalBase
  id: WeaponBattleRifleFnFalFilledSTANAG20rdFMJ
  suffix: FMJ - STANAG 20rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine7,62x51mmSTANAG20rdFMJ
