- type: entity
  id: WeaponBattleRifleFnFalBase
  name: FN FAL (7,62x51mm NATO)
  description: A somewhat modern battle rifle made by the belgian company FN Herstal and used by armies throughout the world, nicknamed "the right arm of the free world". Chambered in 7,62x51mm NATO .
  parent: BaseWeaponRifle
  abstract: true
  components:
    - type: Sprite
      scale: 0.60, 0.60
      sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/FN-FAL_64x32.rsi
      layers:
        - state: base
          map:
            - enum.GunVisualLayers.Base
        - state: mag-0
          map:
            - enum.GunVisualLayers.Mag
    - type: Item
      size: Large
      sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/FN-FAL_32x32.rsi
      shape:
        - 0,0,5,1
      storedScale: 2
    - type: Clothing
      clothingVisuals:
        slingfront:
          - state: equipped-SLINGFRONT
        suitstorage:
          - state: equipped-SUITSTORAGE
      sprite: _Cataclysm14/Objects/Weapons/Guns/BattleRifles/FN-FAL_32x32.rsi
    - type: Gun
      soundGunshot:
        path: /Audio/_Harmony/Weapons/Guns/Gunshots/hristov_fire_alt.ogg
        params:
          volume: 15
          variation: 0.1
          rolloffFactor: 0.5
          pitch: 3
      fireRate: 9
    - type: ChamberMagazineAmmoProvider
      soundRack:
        path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: Magazine7,62x51mmSTANAG20rdEmpty
          insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
          priority: 2
          whitelist:
            tags:
              - Magazine7,62x51mmSTANAGCompatible
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: null
          priority: 1
          whitelist:
            tags:
              - Cartridge7,62x51mm
          whitelistFailPopup: gun-magazine-whitelist-fail
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot {}
    - type: MagazineVisuals
      magState: mag
      steps: 1
      zeroVisible: true
    - type: Appearance
    - type: WieldedCrosshair
      rsi:
        sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
        state: all

