#MARK: Base
- type: entity
  name: KelTec RFB (7,62x51mm NATO)
  parent: BaseWeaponRifle
  id: WeaponRifleKelTecRFBBase
  abstract: true
  description: A modern civilian rifle manufactured by KelTec, the KelTec "Rifle, Forward-ejection, Bullpup". Chambered in 7,62x51mm NATO.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/Rifles/KelTec-RFB_64x32.rsi
    scale: 0.55, 0.55
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/Guns/Rifles/KelTec-RFB_32x32.rsi
    size: Large
    shape:
    - 0,0,4,1
    storedScale: 1.8
  - type: Clothing
    slots:
    - slingfront
    - suitstorage
    sprite: _Cataclysm14/Objects/Weapons/Guns/Rifles/KelTec-RFB_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    fireRate: 8
    soundGunshot:
      path: /Audio/_NF/Weapons/Guns/Gunshots/rifle.ogg
      params:
        volume: 10
        variation: 0.1
        pitch: 1.8
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine7,62x51mmSTANAGCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: null
        priority: 1
        whitelist:
          tags:
            - Cartridge7,62x51mm
        whitelistFailPopup: gun-magazine-whitelist-fail
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

