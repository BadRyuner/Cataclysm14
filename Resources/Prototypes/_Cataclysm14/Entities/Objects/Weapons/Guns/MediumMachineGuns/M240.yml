#MARK: Base
- type: entity
  name: M240 (7,62x51mm NATO)
  parent: BaseWeaponRifle
  id: WeaponMediumMachineGunM240Base
  abstract: true
  description: A modern LMG made for use by the US army and NATO countries, Chambered in 7,62x51mm NATO .
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/MediumMachineGuns/M240_64x32.rsi
    scale: 0.55, 0.55
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/Guns/MediumMachineGuns/M240_32x32.rsi
    size: Large
    shape:
    - 0,0,5,1
    storedScale: 2
  - type: Clothing
    sprite: _Cataclysm14/Objects/Weapons/Guns/MediumMachineGuns/M240_32x32.rsi
    clothingVisuals:
      suitstorage:
      - state: equipped-SUITSTORAGE
      slingfront:
      - state: equipped-SUITSTORAGE
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -30
  - type: Gun
    minAngle: 21
    maxAngle: 70
    angleIncrease: 5
    angleDecay: 20
    fireRate: 9
    soundGunshot:
      path: /Audio/_Cataclysm14/Weapons/Guns/Gunshots/cata_LMG_1.ogg
      params:
        pitch: 1.2
        volume: 15
        variation: 0.15
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Cataclysm14/Weapons/Guns/Cocking/cata_heavy_1.ogg
    soundBoltClosed:
      path: /Audio/_Cataclysm14/Weapons/Guns/Bolt/cata_bolt_heavy_1_closing.ogg
    soundBoltOpened:
      path: /Audio/_Cataclysm14/Weapons/Guns/Bolt/cata_bolt_heavy_1_opening.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/_Cataclysm14/Weapons/Guns/MagIn/cata_belt_1.ogg
        ejectSound: /Audio/_Cataclysm14/Weapons/Guns/MagOut/cata_belt_1.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine7,62x51mmSTANAGCompatible
            - AmmoBelt7,62x51mm
            - MagazineBox7,62x51mmLMGCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: null
        priority: 1
        whitelist:
          tags:
            - Cartridge7,62x51mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

#MARK: Box 200rd Empty
- type: entity
