- type: entity
  id: WeaponPistolM1911Base
  name: M1911 (.45 ACP)
  description: A cheap, ubiquitous sidearm used for two world wars, uses .45 Automatic Colt Pistol (ACP) cartridge.
  parent: BaseWeaponPistol
  components:
    - type: Item
      size: Normal
      shape:
        - 0,0,1,1
      storedScale: 2
    - type: Sprite
      scale: 0.4,0.4
      sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/M1911.rsi
      layers:
        - state: base
          map:
            - enum.GunVisualLayers.Base
        - state: mag-0
          map:
            - enum.GunVisualLayers.Mag
    - type: Clothing
      sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/M1911.rsi
      netsync: false
    - type: Gun
      soundGunshot:
        path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mk_fire.ogg
        params:
          playOffsetSeconds: 0.1
          volume: 13
          variation: 0.1
          pitch: 1.2
      fireRate: 10
      availableModes:
        - SemiAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: Magazine45AcpM1911_10rdFMJ
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 2
          whitelist:
            tags:
              - Magazine45AcpM1911Compatible
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: Cartridge9x19mmParabellumFMJ
          priority: 1
          whitelist:
            tags:
              - Cartridge9x19mmParabellum
          whitelistFailPopup: gun-magazine-whitelist-fail
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot {}
    - type: StaticPrice
      price: 50

