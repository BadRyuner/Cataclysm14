- type: entity
  name: M1911 (.45 ACP)
  parent: BaseWeaponPistol
  id: WeaponPistolM1911Base
  description: A cheap, ubiquitous sidearm used for two world wars, uses .45 Automatic Colt Pistol (ACP) cartridge.
  components:
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
    storedScale: 2
  - type: Sprite
    scale: 0.5,0.5
    sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/M1911.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/M1911.rsi
  - type: Gun
    fireRate: 10
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mk_fire.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine45_ACPM1911_10rdFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine45_ACPM1911Compatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge9x19mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge9x19mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: StaticPrice # Mono
    price: 50

- type: entity
  parent: WeaponPistolM1911Base
  id: WeaponPistolM1911Filled10rdEmpty
  suffix: Empty - 10rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine45_ACPM1911_10rdEmpty

- type: entity
  parent: WeaponPistolM1911Base
  id: WeaponPistolM1911Filled10rdFMJ
  suffix: FMJ - 10rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine45_ACPM1911_10rdFMJ
