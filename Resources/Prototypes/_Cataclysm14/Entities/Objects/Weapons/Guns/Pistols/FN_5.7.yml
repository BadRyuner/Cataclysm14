#MARK: Base
- type: entity
  name: FN 5,7 (5,7x28mm)
  parent: BaseWeaponPistol
  id: WeaponPistolFN5,7Base
  abstract: true
  description: A trully expensive gun in an even more expensive caliber, made by the FN Herstal. Used by private militaries and security companies. Chambered in 5,7x28mm.
  components:
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
    storedScale: 2
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/FN5,7.rsi
    scale: 0.4,0.4
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/FN5,7.rsi
  - type: Gun
    fireRate: 10
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mk_fire.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,7x28mmFN5,7rdFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine5,7x28mmFN5,7Compatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge5,7x28mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridges5,7x28mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: StaticPrice # Mono
    price: 50

#MARK: FN 5,7 20rd Empty
- type: entity
  parent: WeaponPistolFN5,7Base
  id: WeaponPistolFN5,7Filled20rdEmpty
  suffix: Empty - 20rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,7x28mmFN5,7_20rdEmpty

#MARK: FN 5,7 20rd FMJ
- type: entity
  parent: WeaponPistolFN5,7Base
  id: WeaponPistolFN5,7Filled20rdFMJ
  suffix: FMJ - 20rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,7x28mmFN5,7_20rdFMJ
