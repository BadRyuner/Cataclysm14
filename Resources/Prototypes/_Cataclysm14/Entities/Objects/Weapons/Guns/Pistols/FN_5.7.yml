- type: entity
  id: WeaponPistolFN5,7Base
  name: FN 5,7 (5,7x28mm)
  description: A trully expensive gun in an even more expensive caliber, made by the FN Herstal. Used by private militaries and security companies. Chambered in 5,7x28mm.
  parent: BaseWeaponPistol
  abstract: true
  components:
    - type: Item
      size: Normal
      shape:
        - 0,0,1,1
      storedScale: 2
    - type: Sprite
      scale: 0.4,0.4
      sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/FN5,7.rsi
      layers:
        - state: base
          map:
            - enum.GunVisualLayers.Base
        - state: mag-0
          map:
            - enum.GunVisualLayers.Mag
    - type: Clothing
      sprite: _Cataclysm14/Objects/Weapons/Guns/Pistols/FN5,7.rsi
    - type: Gun
      soundGunshot:
        path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mk_fire.ogg
        params:
          pitch: 1.4
          volume: 13
          variation: 0.1
          playOffsetSeconds: 0.15
      fireRate: 10
      availableModes:
        - SemiAuto
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: Magazine5,7x28mmFN5,7rdFMJ
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 2
          whitelist:
            tags:
              - Magazine5,7x28mmFN5,7Compatible
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: Cartridge5,7x28mmFMJ
          priority: 1
          whitelist:
            tags:
              - Cartridge5,7x28mm
          whitelistFailPopup: gun-magazine-whitelist-fail
    - type: ContainerContainer
      containers:
        gun_magazine: !type:ContainerSlot {}
        gun_chamber: !type:ContainerSlot {}
    - type: StaticPrice
      price: 50

