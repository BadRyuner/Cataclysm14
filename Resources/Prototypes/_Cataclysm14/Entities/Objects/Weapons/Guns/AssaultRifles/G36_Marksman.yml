- type: entity
  name: HK G36 Marksman (5.56x45mm NATO)
  parent: BaseWeaponRifle
  id: WeaponAssaultRifleG36MarksmanBase
  abstract: true
  description: A modern polymer assault rifle based on the M16 and XM serie of rifles. Chambered in 5.56x45mm NATO.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/G36_Marksman_64x32.rsi
    scale: 0.55, 0.55
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/G36_Marksman_32x32.rsi
    size: Huge
    shape:
    - 0,0,4,1
    storedScale: 1.8
  - type: Clothing
    slots:
    - slingfront
    - suitstorage
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/G36_Marksman_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    fireRate: 8
    soundGunshot:
      path: /Audio/_NF/Weapons/Guns/Gunshots/rifle.ogg
      params:
        volume: 10
        variation: 0.1
        pitch: 1.8
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine5.56x45mmSTANAGCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: null
        priority: 1
        whitelist:
          tags:
            - Cartridge5.56x45mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

- type: entity
  parent: WeaponAssaultRifleG36MarksmanBase
  id: WeaponAssaultRifleG36MarksmanFilledSTANAG30rdEmpty
  suffix: Empty - STANAG 30rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5.56x45mmSTANAG30rdEmpty

- type: entity
  parent: WeaponAssaultRifleG36MarksmanBase
  id: WeaponAssaultRifleG36MarksmanFilledSTANAG30rdFMJ
  suffix: FMJ - STANAG 30rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5.56x45mmSTANAG30rdFMJ

- type: entity
  parent: WeaponAssaultRifleG36MarksmanBase
  id: WeaponAssaultRifleG36MarksmanFilledSTANAG30rdTracerRed
  suffix: Tracer Red - STANAG 30rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5.56x45mmSTANAG30rdTracerRed
