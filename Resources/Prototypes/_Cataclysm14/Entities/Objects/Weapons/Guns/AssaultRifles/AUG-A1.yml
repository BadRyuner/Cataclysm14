#MARK: Base
- type: entity
  name: Steyr Aug-A1 (5,56x45mm NATO)
  parent: BaseWeaponRifle
  id: WeaponAssaultRifleAugA1Base
  abstract: true
  description: A modern polymer bullpup assault rifle made by Steyr and used by the austrian army. Chambered in 5,56x45mm NATO.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/AUG-A1_64x32.rsi
    scale: 0.65, 0.65
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/AUG-A1_32x32.rsi
    size: Large
    shape:
    - 0,0,3,1
    storedScale: 1.6
  - type: Clothing
    slots:
    - slingfront
    - suitstorage
    sprite: _Cataclysm14/Objects/Weapons/Guns/AssaultRifles/AUG-A1_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    fireRate: 9
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mk_fire.ogg
      params:
        volume: 10
        variation: 0.1
        pitch: 1.2
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,56x45mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine5,56x45mmSTANAGCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge5,56x45mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge5,56x45mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

#MARK: Magpul Black 30rd Empty
- type: entity
  parent: WeaponAssaultRifleAugA1Base
  id: WeaponAssaultRifleAugA1FilledMagpulBlack30rdEmpty
  suffix: Empty - Magpul Black 30rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,56x45mmMagpulBlack30rdEmpty

#MARK: Magpul Black 30rd FMJ
- type: entity
  parent: WeaponAssaultRifleAugA1Base
  id: WeaponAssaultRifleAugA1FilledMagpulBlack30rdFMJ
  suffix: FMJ - Magpul Black 30rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,56x45mmMagpulBlack30rdFMJ
