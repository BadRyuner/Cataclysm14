#MARK: Base
- type: entity
  id: BaseMagazine4.6x30mm
  name: pistol magazine (4.6x30mm FMJ)
  parent: [ BaseItem, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
      - Magazine4.6x30mmPistolFMJ
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge4.6x30mm
    capacity: 21
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    scale: 0.30,0.30
    sprite: _Cataclysm14/Objects/Weapons/Magazines/4.6x30mm/4.6x30mm_pistol_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

#MARK: MP7 30rd
- type: entity
  id: BaseMagazine4.6x30mmMP7_30rd
  abstract: true
  name: "MP7 30rd magazine (4.6x30mm)"
  parent: BaseMagazine4.6x30mm
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge4.6x30mmFMJ
    capacity: 30
  - type: Tag
    tags:
      - Magazine4.6x30mmMP7Compatible
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Magazines/4.6x30mm/magazine_4.6x30mm_MP7_30rd.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

