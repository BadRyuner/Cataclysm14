#MARK: Base
- type: entity
  id: BaseMagazine7,62x39mm
  name: "magazine (7,62x39mm FMJ)"
  parent: [ BaseItem, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge7,62x39mm
    proto: Cartridge7,62x39mmFMJ
    capacity: 30
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    scale: 0.30,0.30
    sprite: _Cataclysm14/Objects/Weapons/Magazines/7,62x39mm/7,62x39mm_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

