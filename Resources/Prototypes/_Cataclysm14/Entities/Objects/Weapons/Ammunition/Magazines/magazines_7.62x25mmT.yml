#MARK: Base
- type: entity
  id: BaseMagazine7,62x25mmT
  name: "magazine (7,62x25mm Tokarev FMJ)"
  parent: [ BaseItem, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
      - Magazine7,62x25mmTFMJ
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge7,62x25mmT
    proto: Cartridge7,62x25mmTFMJ
    capacity: 20
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    scale: 0.40,0.40
    sprite: _Cataclysm14/Objects/Weapons/Magazines/7,62x25mmT/7,62x25mmT_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

