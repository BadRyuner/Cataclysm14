- type: entity
  id: BaseMagazine12_Gauge
  name: ammo drum (12 gauge shells)
  parent: [ BaseItem, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
    - Magazine12_GaugeBuckshot
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - ShellShotgun12_Gauge
    capacity: 8
    soundRack:
      path: /Audio/Weapons/Guns/Cock/smg_cock.ogg
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Magazines/12_Gauge/12_Gauge_drum.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: Magazine12_GaugeEmpty
  name: ammo drum (12 gauge shells any)
  suffix: empty
  parent: BaseMagazine12_Gauge
  components:
  - type: BallisticAmmoProvider
    proto: null

