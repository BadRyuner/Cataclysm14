# Novalite
- type: entity
  parent: BaseMagazine5.56x45mm
  id: MagazineNovaliteC1Empty
  categories: [ HideSpawnMenu ]
  name: "clip (5.56x45mm NATO any)"
  suffix: empty
  components:
  - type: Tag
    tags:
      - MagazineNovaliteC1
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge5.56x45mmFMJ
    capacity: 25
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Magazine/5.56x45mm/novalite_clip.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-15
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 16
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: MagazineNovaliteC1Empty
  id: MagazineNovaliteC1
  categories: [ HideSpawnMenu ]
  name: "clip (5.56x45mm NATO FMJ)"
  suffix: full
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge5.56x45mmFMJ
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-15
