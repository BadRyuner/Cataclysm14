#MARK: Base
- type: entity
  id: BaseMagazine45_Acp
  parent: [ BaseItem, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
      - Magazine45_AcpPistolFMJ
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge45_Acp
    capacity: 17
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    scale: 0.30,0.30
    sprite: _Cataclysm14/Objects/Weapons/Magazines/45_Acp/45_Acp_pistol_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

#MARK: M1911 Mag 10rd
- type: entity
  id: BaseMagazine45_AcpM1911_10rd
  abstract: true
  name: "M1911 10rd magazine (.45 ACP)"
  parent: BaseMagazine45_Acp
  components:
  - type: BallisticAmmoProvider
    capacity: 10
  - type: Item
    storedScale: 2
  - type: Tag
    tags:
      - Magazine45_AcpM1911Compatible
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Magazines/45_Acp/magazine_45_Acp_M1911_10rd.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

#MARK: Empty
- type: entity
  id: Magazine45_AcpM1911_10rdEmpty
  suffix: Empty
  parent: BaseMagazine45_AcpM1911_10rd
  components:
  - type: BallisticAmmoProvider
    proto: null

#MARK: FMJ
- type: entity
  id: Magazine45_AcpM1911_10rdFMJ
  suffix: FMJ
  parent: BaseMagazine45_AcpM1911_10rd
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45_AcpFMJ

#MARK: UMP45 Mag 30rd
- type: entity
  id: BaseMagazine45_AcpUMP45_30rd
  abstract: true
  name: "UMP45 30rd magazine (.45 ACP)"
  parent: BaseMagazine45_Acp
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45_AcpFMJ
    capacity: 30
  - type: Tag
    tags:
      - Magazine45_AcpUMP45Compatible
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Magazines/45_Acp/magazine_45_Acp_UMP45_30rd.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

#MARK: Empty
- type: entity
  id: Magazine45_AcpUMP45_30rdEmpty
  suffix: Empty
  parent: BaseMagazine45_AcpUMP45_30rd
  components:
  - type: BallisticAmmoProvider
    proto: null

