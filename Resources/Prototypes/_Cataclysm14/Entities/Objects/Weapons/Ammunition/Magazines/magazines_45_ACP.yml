#MARK: Base
- type: entity
  id: BaseMagazine45Acp
  parent: [ BaseItem, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
      - Magazine45AcpPistolFMJ
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge45Acp
    capacity: 17
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    scale: 0.30,0.30
    sprite: _Cataclysm14/Objects/Weapons/Magazines/45Acp/45Acp_pistol_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

#MARK: M1911 Mag 10rd
- type: entity
  id: BaseMagazine45AcpM1911_10rd
  abstract: true
  name: "M1911 10rd magazine (.45 ACP)"
  parent: BaseMagazine45Acp
  components:
  - type: BallisticAmmoProvider
    capacity: 10
  - type: Item
    storedScale: 2
  - type: Tag
    tags:
      - Magazine45AcpM1911Compatible
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Magazines/45Acp/magazine_45Acp_M1911_10rd.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

#MARK: Empty
- type: entity
  id: Magazine45AcpM1911_10rdEmpty
  suffix: Empty
  parent: BaseMagazine45AcpM1911_10rd
  components:
  - type: BallisticAmmoProvider
    proto: null

#MARK: FMJ
- type: entity
  id: Magazine45AcpM1911_10rdFMJ
  suffix: FMJ
  parent: BaseMagazine45AcpM1911_10rd
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45AcpFMJ

#MARK: UMP45 Mag 30rd
- type: entity
  id: BaseMagazine45AcpUMP45_30rd
  abstract: true
  name: "UMP45 30rd magazine (.45 ACP)"
  parent: BaseMagazine45Acp
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45AcpFMJ
    capacity: 30
  - type: Tag
    tags:
      - Magazine45AcpUMP45Compatible
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Magazines/45Acp/magazine_45Acp_UMP45_30rd.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

#MARK: Empty
- type: entity
  id: Magazine45AcpUMP45_30rdEmpty
  suffix: Empty
  parent: BaseMagazine45AcpUMP45_30rd
  components:
  - type: BallisticAmmoProvider
    proto: null

#MARK: FMJ
- type: entity
  id: Magazine45AcpUMP45_30rdFMJ
  suffix: FMJ
  parent: BaseMagazine45AcpUMP45_30rd
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45AcpFMJ
