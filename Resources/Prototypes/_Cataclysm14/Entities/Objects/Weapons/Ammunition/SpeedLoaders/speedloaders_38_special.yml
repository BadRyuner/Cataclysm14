#MARK: Base
- type: entity
  name: "speed loader (.38 Special)"
  id: BaseSpeedLoader38Special
  parent: BaseItem
  abstract: true
  components:
  - type: Icon
    sprite: _Cataclysm14/Objects/Weapons/SpeedLoaders/38Special/speedloader_38Special_6rd.rsi
    state: icon
  - type: Item
    storedScale: 2.5
  - type: Sprite
    scale: 0.25,0.25
    sprite: _Cataclysm14/Objects/Weapons/SpeedLoaders/38Special/speedloader_38Special_6rd.rsi
    layers:
      - state: base
        map: [ "enum.GunVisualLayers.Base" ]
      - state: base-6
        map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: base
    steps: 7
    zeroVisible: false
  - type: Tag
    tags:
      - SpeedLoader38Special
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - Cartridge38Special
    capacity: 6
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: Appearance

#MARK: FMJ
- type: entity
  id: SpeedLoader38SpecialFMJ
  suffix: FMJ
  parent: BaseSpeedLoader38Special
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge38SpecialFMJ

#MARK: JHP
- type: entity
  id: SpeedLoader38SpecialJHP
  suffix: JHP
  parent: BaseSpeedLoader38Special
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge38SpecialJHP

#MARK: +P
- type: entity
  id: SpeedLoader38Special+P
  suffix: +P
  parent: BaseSpeedLoader38Special
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge38Special+P

#MARK: Empty
- type: entity
  id: SpeedLoader38SpecialEmpty
  suffix: Empty
  parent: BaseSpeedLoader38Special
  components:
  - type: BallisticAmmoProvider
    proto: null

#MARK: Rubber
- type: entity
  id: SpeedLoader38SpecialRubber
  suffix: Rubber
  parent: BaseSpeedLoader38Special
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge38SpecialRubber
