- type: entity
  id: BaseSpeedLoader9x19mmParabellum
  name: "speed loader (9x19mmParabellum FMJ)"
  parent: BaseItem
  abstract: true
  components:
  - type: Tag
    tags:
      - SpeedLoader9x19mmParabellumFMJ
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - Cartridge9x19mmParabellum
    capacity: 8
  - type: Sprite
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []

- type: entity
