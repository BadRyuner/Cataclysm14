    proto: Cartridge9x19mmParabellumFMJ
  - type: Icon
    sprite: _Cataclysm14/Objects/Weapons/SpeedLoaders/9x19mmParabellum/9x19mmParabellum.rsi
    state: icon
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/SpeedLoaders/9x19mmParabellum/9x19mmParabellum.rsi
    layers:
      - state: base
        map: [ "enum.GunVisualLayers.Base" ]
      - state: base-8
        map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: base
    steps: 9
    zeroVisible: false
  - type: Appearance

