#MARK: Base
- type: entity
  abstract: true
  parent: [BaseItem, RecyclableItemCardboard]
  id: BaseAmmoBox45Acp
  name: ammunition box (.45 ACP FMJ)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge45Acp
    proto: Cartridge45AcpFMJ
    capacity: 40
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Boxes/45Acp.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg

#MARK: FMJ
- type: entity
  parent: BaseAmmoBox45Acp
  id: AmmoBox45AcpFMJ
  name: ammunition box (.45 ACP FMJ)
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge45AcpFMJ
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

