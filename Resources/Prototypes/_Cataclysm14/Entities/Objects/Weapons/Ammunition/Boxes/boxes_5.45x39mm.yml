#MARK: Base
- type: entity
  abstract: true
  parent: [BaseItem, RecyclableItemCardboard] # Frontier: added RecyclableItemCardboard
  id: BaseAmmoBox5.45x39mm
  name: ammunition box (5.45x39mm FMJ)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge5.45x39mm
    proto: Cartridge5.45x39mmFMJ
    capacity: 70 # more than 2 rifle mag
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Boxes/5.45x39mm.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Tag
    tags:
    - Magazine5.45x39mmBox
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg

#MARK: FMJ
- type: entity
  parent: BaseAmmoBox5.45x39mm
  id: AmmoBox5.45x39mmFMJ
  name: ammunition box (5.45x39mm FMJ)
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge5.45x39mmFMJ
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

