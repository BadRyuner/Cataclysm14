#MARK: Big FMJ
- type: entity
  parent: BaseAmmoBox5.45x39mm
  id: AmmoBox5.45x39mmBigFMJ
  name: big ammunition box (5.45x39mm FMJ)
  suffix: Big
  components:
  - type: Item
    shape:
    - 0,0,1,1
  - type: BallisticAmmoProvider
    capacity: 210 # 7 rifle mags
    proto: Cartridge5.45x39mmFMJ
  - type: Sprite
    layers:
    - state: base-b # Frontier: base-big<base-b
      map: ["enum.GunVisualLayers.Base"]
    - state: magb-1 # Frontier: mag-big-1<magb-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: magb # Frontier: mag-big<magb
    steps: 4
    zeroVisible: false
  - type: Appearance
