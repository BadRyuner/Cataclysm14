# Shotgun Shells
- type: entity
  parent: AmmoProvider4_GaugeShotgunShell
  id: AmmoBox4_GaugeBeanbag
  name: shotgun shell box (4 gauge beanbag)
  components:
    - type: BallisticAmmoProvider
      proto: ShellShotgun4_GaugeBeanbag
    - type: MagazineVisuals
      magState: mag-beanbag
      steps: 5
      zeroVisible: false
    - type: Sprite
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-beanbag-1
        map: ["enum.GunVisualLayers.Mag"]
      - state: beanbag

