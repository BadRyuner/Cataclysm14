#MARK: Big FMJ
- type: entity
  parent: BaseAmmoBox38_special
  id: AmmoBox38_specialBigFMJ
  name: big ammunition box (.38 Special FMJ)
  suffix: Big
  components:
  - type: Item
    shape:
    - 0,0,1,1
  - type: BallisticAmmoProvider
    capacity: 150
    proto: Cartridge38_specialFMJ
  - type: Sprite
    layers:
    - state: base-b
      map: ["enum.GunVisualLayers.Base"]
    - state: magb-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: magb
    steps: 4
    zeroVisible: false
  - type: Appearance
