  - type: BallisticAmmoProvider
    capacity: 180 # 9 full power mags
    proto: Cartridge7,62x51mmFMJ
  - type: Sprite
    layers:
    - state: base-b # Frontier: base-big<base-b
      map: ["enum.GunVisualLayers.Base"]
