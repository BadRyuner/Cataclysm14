#MARK: Beanbag
- type: entity
  parent: AmmoProvider12GaugeShotgunShell
  id: AmmoBox12GaugeBeanbag
  name: shotgun shell box (12 gauge beanbag)
  components:
    - type: BallisticAmmoProvider
      proto: ShellShotgun12GaugeBeanbag
    - type: MagazineVisuals
      magState: mag-beanbag
      steps: 5
      zeroVisible: false
    - type: Sprite
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-beanbag-1
        map: ["enum.GunVisualLayers.Mag"]
      - state: beanbag

