#MARK: Base
- type: entity
  id: BaseShellShotgun12Gauge
  name: shotgun shell (12 gauge)
  parent: BaseCartridge
  description: Standard shotgun round practically everywhere.
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - ShellShotgun12Gauge
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
      params:
        variation: 0.06
  - type: EmitSoundOnLand
    sound:
      collection: ShellEject
      params:
        variation: 0.06
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Casings/12Gauge_shell.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
    scale: 0.3, 0.3
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

#MARK: Beanbag
- type: entity
  id: ShellShotgun12GaugeBeanbag
  name: shotgun shell (12 gauge beanbag)
  parent: BaseShellShotgun12Gauge
  components:
  - type: Tag
    tags:
    - Cartridge
    - ShellShotgun12Gauge
  - type: Sprite
    layers:
      - state: beanbag
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: CartridgeAmmo
    proto: Pellet12GaugeBeanbag
  - type: SpentAmmoVisuals
    state: "beanbag"

