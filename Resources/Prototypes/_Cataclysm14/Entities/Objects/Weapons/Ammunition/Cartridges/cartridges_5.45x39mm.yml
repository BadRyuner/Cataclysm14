#MARK: Base
- type: entity
  id: BaseCartridge5,45x39mm
  name: cartridge (5,45x39mm FMJ)
  parent: BaseCartridge
  description: This round has seen use in the rifles of multiple armies, militias and militaries alike.
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - Cartridge5,45x39mm
  - type: CartridgeAmmo
    proto: Bullet5,45x39mmFMJ
  - type: Sprite
    scale: 0.3, 0.3
    sprite: _Cataclysm14/Objects/Weapons/Casings/5,45x39mm_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

