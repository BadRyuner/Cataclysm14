    tags:
    - Cartridge
    - ShellShotgun4Gauge
  - type: Sprite
    layers:
      - state: beanbag
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: CartridgeAmmo
    proto: Pellet4GaugeBeanbag
  - type: SpentAmmoVisuals
