#MARK: Base
- type: entity
  id: BaseShellShotgun4Gauge
  name: shotgun shell (4 gauge)
  parent: BaseCartridge
  description: Large shotgun round. Kicks like a mule, and will tear a chunk out of anything that doesnt have the armor to protect it.
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - ShellShotgun4Gauge
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
      params:
        variation: 0.06
  - type: EmitSoundOnLand
    sound:
      collection: ShellEject
      params:
        variation: 0.06
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Casings/4Gauge_shell.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
    scale: 0.3, 0.3
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

#MARK: Beanbag
- type: entity
  id: ShellShotgun4GaugeBeanbag
  name: shotgun shell (4 gauge beanbag)
