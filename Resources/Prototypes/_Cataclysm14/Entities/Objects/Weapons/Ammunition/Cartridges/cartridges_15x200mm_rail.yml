    damage:
      types:
        Piercing: 45
        Structural: 50
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: _Cataclysm14/Objects/Weapons/Hitscans/hitscan_railgun.rsi
      state: muzzle
    travelFlash:
      sprite: _Cataclysm14/Objects/Weapons/Hitscans/hitscan_railgun.rsi
      state: trail
    impactFlash:
      sprite: _Cataclysm14/Objects/Weapons/Hitscans/hitscan_railgun.rsi
