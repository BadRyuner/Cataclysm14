- type: entity
  id: BaseCartridge.38_special
  name: cartridge (.38 Special FMJ)
  parent: BaseCartridge
  description: Heavier alternative to 9x19mm for handguns and SMGs.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge.38_specialFMJ
  - type: CartridgeAmmo
    proto: Bullet.38_specialFMJ
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

