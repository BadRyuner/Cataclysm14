#MARK: Base
- type: entity
  id: BaseCartridge9x19mmParabellum
  name: cartridge (9x19mmParabellum FMJ)
  parent: BaseCartridge
  description: Generic pistol round. Easy to handle, with a decent effect on unarmored flesh.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge9x19mmParabellum
  - type: CartridgeAmmo
    proto: Bullet9x19mmParabellumFMJ
  - type: Sprite
    scale: 0.3,0.3
