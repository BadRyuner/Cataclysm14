#MARK: Base
- type: entity
  id: BaseCartridge9x19mmParabellum
  name: cartridge (9x19mm parabellum FMJ)
  parent: BaseCartridge
  description: Generic pistol round. Easy to handle, with a decent effect on unarmored flesh, based on the 9x19mm Luger and Parabellum.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge9x19mmParabellum
  - type: CartridgeAmmo
    proto: Bullet9x19mmParabellumFMJ
  - type: Sprite
    scale: 0.3,0.3
    sprite: _Cataclysm14/Objects/Weapons/Casings/9x19mm_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

