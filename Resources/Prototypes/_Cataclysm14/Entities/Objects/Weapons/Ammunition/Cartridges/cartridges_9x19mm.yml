#MARK: Base
- type: entity
  id: BaseCartridge9x19mm
  name: cartridge (9x19mm FMJ)
  parent: BaseCartridge
  description: Generic pistol round. Easy to handle, with a decent effect on unarmored flesh.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridges9x19mm
  - type: CartridgeAmmo
    proto: Bullet9x19mmFMJ
  - type: Sprite
    scale: 0.3,0.3
    sprite: _Cataclysm14/Objects/Weapons/Casings/9x19mm_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

