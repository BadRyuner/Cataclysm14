#MARK: Base
- type: entity
  id: BaseCartridge5.56x45mm
  name: cartridge (5.56x45mm NATO FMJ)
  parent: BaseCartridge
  description: An extremely-common intermediate cartridge for rifles.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge5.56x45mmFMJ
  - type: CartridgeAmmo
    proto: Bullet5.56x45mmFMJ
  - type: Sprite
    scale: 0.3, 0.3
    sprite: _Cataclysm14/Objects/Weapons/Casings/5.56x45mm_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

