- type: entity
  id: BaseCartridge45Magnum
  name: cartridge (.45 magnum)
  parent: BaseCartridge
  description: Heavy magnum round, usually only seen in magnums or manually-cycled rifles.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge45Magnum
  - type: CartridgeAmmo
    proto: Bullet45MagnumFMJ
  - type: Sprite
    scale: 0.25,0.25
    sprite: _Cataclysm14/Objects/Weapons/Casings/45Magnum_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

- type: entity
  id: Cartridge45MagnumFMJ
  name: cartridge (.45 magnum)
  parent: BaseCartridge45Magnum
