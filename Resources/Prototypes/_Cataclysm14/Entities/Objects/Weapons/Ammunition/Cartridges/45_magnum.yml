- type: entity
  id: BaseCartridge45_Magnum
  name: cartridge (.45 magnum)
  parent: BaseCartridge
  description: Heavy magnum round, usually only seen in magnums or manually-cycled rifles.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge45_Magnum
  - type: CartridgeAmmo
    proto: Bullet45_MagnumFMJ
  - type: Sprite
    scale: 0.25,0.25
    sprite: _Cataclysm14/Objects/Weapons/Casings/45_Magnum_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

- type: entity
