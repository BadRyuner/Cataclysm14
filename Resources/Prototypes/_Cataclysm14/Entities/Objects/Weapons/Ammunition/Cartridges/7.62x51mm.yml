#MARK: Base
- type: entity
  id: BaseCartridge7.62x51mm
  name: cartridge (7.62x51mm NATO FMJ)
  parent: BaseCartridge
  description: A decently sized full-power round.
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - Cartridge7.62x51mmFMJ
  - type: CartridgeAmmo
    proto: Bullet7.62x51mmFMJ
  - type: Sprite
    scale: 0.3, 0.3
    sprite: _Cataclysm14/Objects/Weapons/Casings/7.62x51mm_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

