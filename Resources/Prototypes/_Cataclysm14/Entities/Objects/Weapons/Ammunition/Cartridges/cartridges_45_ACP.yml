#MARK: Base
- type: entity
  id: BaseCartridge45_Acp
  parent: BaseCartridge
  description: Heavier alternative to 9x19mmParabellum for handguns and SMGs.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge45_Acp
  - type: CartridgeAmmo
    proto: Bullet45_AcpFMJ
  - type: Sprite
    scale: 0.2,0.2
    sprite: _Cataclysm14/Objects/Weapons/Casings/45_Acp_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

