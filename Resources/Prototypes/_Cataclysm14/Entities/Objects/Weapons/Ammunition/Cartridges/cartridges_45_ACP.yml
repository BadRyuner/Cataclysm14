#MARK: Base
- type: entity
  id: BaseCartridge45Acp
  parent: BaseCartridge
  description: Heavier alternative to 9x19mmParabellum for handguns and SMGs.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge45Acp
  - type: CartridgeAmmo
    proto: Bullet45AcpFMJ
  - type: Sprite
    scale: 0.2,0.2
    sprite: _Cataclysm14/Objects/Weapons/Casings/45Acp_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

#MARK: FMJ
- type: entity
  id: Cartridge45AcpFMJ
  name: cartridge (.45 ACP FMJ)
  parent: BaseCartridge45Acp
  components:
