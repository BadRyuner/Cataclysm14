#MARK: Base
- type: entity
  id: BaseCartridge45_ACP
  parent: BaseCartridge
  description: Heavier alternative to 9x19mm for handguns and SMGs.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge45_ACP
  - type: CartridgeAmmo
    proto: Bullet45_ACPFMJ
  - type: Sprite
    scale: 0.2,0.2
    sprite: _Cataclysm14/Objects/Weapons/Casings/45_ACP_casing.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

#MARK: FMJ
- type: entity
