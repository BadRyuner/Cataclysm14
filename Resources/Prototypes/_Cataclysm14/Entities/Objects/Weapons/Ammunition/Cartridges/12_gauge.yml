- type: entity
  id: BaseShellShotgun12_Gauge
  name: shotgun shell (12 gauge)
  parent: BaseCartridge
  description: Standard shotgun round practically everywhere.
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - ShellShotgun12_Gauge
  - type: CartridgeAmmo
    soundEject:
      collection: ShellEject
      params:
        variation: 0.06
  - type: EmitSoundOnLand
    sound:
      collection: ShellEject
      params:
        variation: 0.06
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Casings/12_Gauge_shell.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
    scale: 0.3, 0.3
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

- type: entity
  id: ShellShotgun12_GaugeBeanbag
  name: shotgun shell (12 gauge beanbag)
