- type: entity
  id: ShellShotgun12GaugeImprovised
  name: improvised shotgun shell (12 gauge)
  description: A homemade shotgun shell that shoots painful glass shrapnel. The spread is so wide that it couldn't hit the broad side of a barn.
  parent: BaseShellShotgun12Gauge
  components:
  - type: Tag
    tags:
    - Cartridge
    - ShellShotgun12Gauge
  - type: Sprite
    layers:
      - state: improvised
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Construction
    graph: ImprovisedShotgunShellGraph
    node: shell
  - type: CartridgeAmmo
    proto: Pellet12GaugeImprovisedSpread
  - type: SpentAmmoVisuals
    state: "improvised"

