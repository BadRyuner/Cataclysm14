  - type: Sprite
    layers:
      - state: beanbag
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: CartridgeAmmo
    proto: Pellet12_GaugeBeanbag
  - type: SpentAmmoVisuals
    state: "beanbag"

