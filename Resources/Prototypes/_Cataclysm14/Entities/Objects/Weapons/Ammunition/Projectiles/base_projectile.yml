
# One bullet to bring them all into the darkness and bind them
- type: entity
  id: BaseProjectileBullet
  name: BaseProjectileBullet
  description: If you can see this you're probably dead!
  abstract: true
  components:
  - type: Reflective
  - type: FlyBySound
  - type: Clickable
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Projectiles/bullets.rsi
    layers:
    - state: projectile_bullet
      shader: unshaded
  - type: Physics
    bodyType: Dynamic
    linearDamping: 0
    angularDamping: 0
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
      fly-by: &flybyfixture
        shape: !type:PhysShapeCircle
          radius: 1.5
        layer:
        - Impassable
        - MidImpassable
        - HighImpassable
        - LowImpassable
        hard: False
  - type: Projectile
    impactEffect: BulletImpactEffect
    damage:
      types:
        Piercing: 14
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: TimedDespawn
    lifetime: 10
  - type: Tracer # Mono
    color: "#68686896"
    length: 1
  - type: LagCompensation

#MARK: Incendiary
- type: entity
  parent: BaseBulletIncendiary
  id: BaseProjectileBulletIncendiary
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Projectiles/bullets.rsi
    layers:
    - state: projectile_incendiary
      shader: unshaded

