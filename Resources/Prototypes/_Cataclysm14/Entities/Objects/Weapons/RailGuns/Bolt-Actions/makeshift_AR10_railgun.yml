#MARK: Base
- type: entity
  name: makeshift AR-10 railgun (15x200mm rail)
  parent: BaseWeaponRifle
  id: WeaponRailgunBoltActionRifleAR10RailgunMakeshiftBase
  abstract: true
  description: A makeshift railgun made out of scraped super-conductors and AR-10 parts and lower, uses 15x200mm rail ammo.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/RailGuns/BoltActions/makeshift_AR10_railgun_64x32.rsi
    scale: 0.55, 0.55
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/RailGuns/BoltActions/makeshift_AR10_railgun_32x32.rsi
    size: Large
    shape:
    - 0,0,6,1
    storedScale: 2
  - type: Clothing
    slots:
    - slingfront
    - suitstorage
    sprite: _Cataclysm14/Objects/Weapons/RailGuns/BoltActions/makeshift_AR10_railgun_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    fireRate: 0.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
      params:
        volume: 10
        variation: 0.1
        pitch: 0.7
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine5,56x45mmSTANAGCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: null
        priority: 1
        whitelist:
          tags:
            - Cartridge5,56x45mm
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

#MARK: 5rd Empty
- type: entity
  parent: WeaponRailgunBoltActionRifleAR10RailgunMakeshiftBase
  id: WeaponRailgunBoltActionRifleAR10RailgunMakeshiftFilled5rdEmpty
  suffix: Empty - 5rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine15x200mmRail5rdEmpty

#MARK: 5rd Steel Rod
- type: entity
  parent: WeaponRailgunBoltActionRifleAR10RailgunMakeshiftBase
  id: WeaponRailgunBoltActionRifleAR10RailgunMakeshiftFilled5rdSteel
  suffix: Steel Rod - 5rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine15x200mmRail5rdSteel
