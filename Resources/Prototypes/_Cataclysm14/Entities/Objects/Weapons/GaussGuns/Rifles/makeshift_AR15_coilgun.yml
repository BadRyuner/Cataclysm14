#MARK: Base
- type: entity
  name: makeshift AR-15 coilgun (5,56x45mm coil)
  parent: BaseWeaponRifle
  id: WeaponCoilgunRifleAR15CoilgunMakeshiftBase
  abstract: true
  description: A makeshift coilgun made out of scraped super-conductors and AR-15 parts and lower, uses Coil 5,56x45mm NATO ammo.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/GaussGuns/Rifles/makeshift_AR15_coilgun_64x32.rsi
    scale: 0.55, 0.55
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Cataclysm14/Objects/Weapons/GaussGuns/Rifles/makeshift_AR15_coilgun_32x32.rsi
    size: Large
    shape:
    - 0,0,6,1
    storedScale: 2
  - type: Clothing
    slots:
    - slingfront
    - suitstorage
    sprite: _Cataclysm14/Objects/Weapons/GaussGuns/Rifles/makeshift_AR15_coilgun_32x32.rsi
    clothingVisuals:
      slingfront:
      - state: equipped-SLINGFRONT
      suitstorage:
      - state: equipped-SUITSTORAGE
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    fireRate: 5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
      params:
        volume: 10
        variation: 0.1
        pitch: 1.3
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine5,56x45mmCoilCompatible
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: null
        priority: 1
        whitelist:
          tags:
            - Cartridge5,56x45mmCoil
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: WieldedCrosshair
    rsi:
      sprite: _Cataclysm14/Scoping/reticle_holotech.rsi
      state: all

#MARK: 25rd Empty
- type: entity
  parent: WeaponCoilgunRifleAR15CoilgunMakeshiftBase
  id: WeaponCoilgunRifleAR15CoilgunMakeshiftFilled25rdEmpty
  suffix: Empty - 25rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,56x45mmCoil25rdEmpty

#MARK: 25rd Steel Coil
- type: entity
  parent: WeaponCoilgunRifleAR15CoilgunMakeshiftBase
  id: WeaponCoilgunRifleAR15CoilgunMakeshiftFilled25rdSteel
  suffix: Coil - 25rd
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine5,56x45mmCoil25rdSteel
