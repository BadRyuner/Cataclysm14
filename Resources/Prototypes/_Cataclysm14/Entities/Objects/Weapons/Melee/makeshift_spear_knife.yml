- type: entity
  name: makeshift wooden knife spear
  parent: BaseItem
  id: WeaponMeleeSpearWoodKnife
  description: A spear made out of a wooden stick with a knife taped on the end, quite sharp innit mate.
  components:
  - type: EmbeddableProjectile
    offset: -0.15,0.0
  - type: ThrowingAngle
    angle: 225
  - type: LandAtCursor
  - type: Tag
    tags:
    - Spear
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
            - -0.40,-0.30
            - -0.30,-0.40
            - 0.40,0.30
            - 0.30,0.40
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Sharp
  - type: Sprite
    sprite: _Cataclysm14/Objects/Weapons/Melee/makeshift_spear_knife.rsi
    layers:
    - state: spear
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 15
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 25
  - type: Item
    size: Ginormous
  - type: Clothing
    quickEquip: false
    slots:
    - back
    - suitStorage
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 5
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30 #excess damage avoids cost of spawning entities.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    # - trigger:
    #     !type:DamageTrigger
    #     damage: 20
    #   behaviors:
    #   - !type:PlaySoundBehavior
    #     sound:
    #       collection: GlassBreak
    #       params:
    #         volume: -4
    #   - !type:SpawnEntitiesBehavior
    #     spawn:
    #       PartRodMetal1:
    #         min: 1
    #         max: 1
    #   - !type:DoActsBehavior
    #     acts: [ "Destruction" ]
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: UseDelay
  - type: Appearance
