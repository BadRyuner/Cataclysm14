- type: entity
  parent: Clothing
  id: BaseAccessIdentification
  name: identification card
  description: A card necessary to access various areas.
  abstract: true
  components:
  - type: Sprite
    scale: 0.20,0.20
    sprite: Objects/Misc/id_cards.rsi
  - type: Clothing
    slots:
    - idcard
    sprite: Objects/Misc/id_cards.rsi
  - type: Item
    shape:
    - 0,0,0,0
    storedScale: 3
    size: Small
    heldPrefix: default
  - type: Access
  - type: IdCard
  - type: StationRecordKeyStorage
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/card_pickup.ogg
      params:
        volume: -5
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/card_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/card_drop.ogg
      params:
        volume: -5
