#MARK: makeshift crowbars
  - type: entity
    parent: BaseToolCrowbar
    id: ToolCrowbarMakeshift
    name: makeshift crowbar
    description: A multipurpose tool to pry open doors made out of bent scrap metal.
    components:
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 24
    - type: Sprite
      state: icon-makeshift
    - type: Tool
      qualities:
      - PryingT1
      - HammeringT1
    - type: Item
      storedSprite:
        state: makeshift-storage
        sprite: _Cataclysm14/Objects/Tools/crowbar.rsi
      inhandVisuals:
        left:
        - state: inhand-left-grey
          color: "#c6b9b3"
        right:
        - state: inhand-right-grey
          color: "#c6b9b3"
    - type: Clothing
      clothingVisuals:
        belt:
        - state: equipped-BELT-grey
          color: "#c6b9b3"

#MARK: Halligan Bar
  - type: entity
    parent: BaseToolCrowbar
    id: ToolHalliganBar
    name: halligan bar
    description: A tool used to pry open doors and used by firefighter for breaching.
    components:
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 24
    - type: Sprite
      sprite: _Cataclysm14/Objects/Tools/halligan_bar.rsi
      state: icon
      scale: 0.9,0.9
    - type: Tool
      qualities:
      - PryingT1
      - PryingT2
      - PryingT3
      - HammeringT1
      - HammeringT2
      - NailPryingT1
      - DiggingT1
