#MARK: Base
  - type: entity
    name: metal crowbar
    parent: BaseItem
    id: BaseToolCrowbar
    abstract: true
    components:
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_Goobstation/Items/handling/crowbar_pickup.ogg
        params:
          volume: -2
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/Items/crowbar_drop.ogg
        params:
          volume: -2
    - type: EmitSoundOnLand
      sound:
        path: /Audio/Items/crowbar_drop.ogg
    # Used for whitelists but not needed by us
    # - type: Tag
    #   tags:
    #   - ToolCrowbar
    - type: MeleeWeapon
      wideAnimationRotation: -135
      damage:
        types:
          Blunt: 16
      soundHit:
        collection: MetalThud
    - type: Tool
      useSound:
        path: /Audio/Items/crowbar.ogg
    - type: ToolTileCompatible
    - type: PhysicalComposition
      materialComposition:
        Steel: 100
    - type: StaticPrice
      price: 22
    - type: Prying
    - type: UseDelay
      delay: 1
    - type: Sprite
      sprite: _Cataclysm14/Objects/Tools/crowbar.rsi
      scale: 0.75,0.75
    - type: Clothing
      sprite: _Cataclysm14/Objects/Tools/crowbar.rsi
      quickEquip: false
      slots:
      - Belt
    - type: Item
      sprite: _Cataclysm14/Objects/Tools/crowbar.rsi
      size: Normal
      shape:
      - 0,0,0,1
    # realism, kinda, feel free to modify if you don't like
    # - type: Tweezers
    #   speed: 0.55
    # - type: SurgeryTool # Shitmed
      startSound: /Audio/Items/crowbar.ogg

#MARK: regular crowbars
  - type: entity
    parent: BaseToolCrowbar
    id: ToolCrowbar
    description: A multipurpose tool to pry open doors.
    components:
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 24
    - type: Sprite
      state: icon
    - type: Item
      storedSprite:
        sprite: _Cataclysm14/Objects/Tools/crowbar.rsi
        state: storage
    - type: Tool
      qualities:
      - PryingT1
      - PryingT2
      - HammeringT1
      - NailPryingT1

  - type: entity
    parent: ToolCrowbar
    id: ToolCrowbarRed
    description: A multipurpose tool to pry open doors and fight interdimensional invaders.
    components:
    - type: Tag
      tags:
      - Crowbar
    - type: Sprite
      layers:
      - state: icon
      - state: cover-icon
        color: "#990000"
    - type: Item
      storedSprite:
        state: red-storage
        sprite: _Cataclysm14/Objects/Tools/crowbar.rsi
      inhandVisuals:
        left:
        - state: inhand-left
        - state: cover-inhand-left
          color: "#990000"
        right:
        - state: inhand-right
        - state: cover-inhand-right
          color: "#990000"
    - type: Clothing
      clothingVisuals:
        belt:
        - state: equipped-BELT
        - state: cover-equipped-BELT
          color: "#990000"

