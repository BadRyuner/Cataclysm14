#MARK: Base
  - type: entity
    parent: BaseItem
    abstract: true
    id: BaseToolScrewdriver
    description: Industrial grade torque in a small screwdriving package.
    components:
    # Goobstation edit start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_Goobstation/Items/handling/screwdriver_pickup.ogg
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/Items/screwdriver_drop.ogg
    # Goobstation edit end
    - type: EmitSoundOnLand
      sound:
        path: /Audio/Items/screwdriver_drop.ogg
    - type: Tag
      tags:
      - Screwdriver
    - type: Item
      sprite: Objects/Tools/screwdriver.rsi
      storedRotation: -90
    - type: MeleeWeapon
      wideAnimationRotation: -90
      attackRate: 1.2
      damage:
        types:
          Piercing: 10
      soundHit:
        path: "/Audio/Weapons/bladeslice.ogg"
    - type: Tool
      qualities:
      - Screwing
      useSound:
        collection: Screwdriver
    - type: PhysicalComposition
      materialComposition:
        Steel: 100

#MARK: Scrawdriver
  - type: entity
    name: screwdriver
    parent: BaseToolScrewdriver
    id: ToolScrewdriver
    description: Industrial grade torque in a small screwdriving package.
    components:
    - type: RandomSprite
      available:
      - enum.DamageStateVisualLayers.Base:
          screwdriver: Rainbow
    - type: Sprite
      scale: 0.5,0.5
      sprite: _Cataclysm14/Objects/Tools/tool_screwdriver.rsi
      layers:
      - state: screwdriver
        map: [ "enum.DamageStateVisualLayers.Base" ]
      - state: screwdriver-screwybits
    - type: Item
      storedScale: 2.3
    - type: Tool
      qualities:
      - ScrewdrivingT1

#MARK: Socket Screwdriver Set
  - type: entity
    name: socket screwdriver set
    parent: BaseToolScrewdriver
    id: ToolScrewdriverSocketSet
    description: Industrial grade torque in a small screwdriving package.
    components:
    - type: Item
      storedScale: 2
      shape:
      - 0,0,1,1
    - type: Sprite
      sprite: _Cataclysm14/Objects/Tools/tool_screwdriver_socket_set.rsi
      scale: 0.7,0.7
      layers:
      - state: icon
    - type: Tool
      qualities:
      - ScrewdrivingT1
      - BoltTurningT1
      - FineBoltTurningT1
