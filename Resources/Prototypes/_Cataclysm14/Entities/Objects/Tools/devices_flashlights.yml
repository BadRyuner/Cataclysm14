#MARK: Handheld Flashlight
- type: entity
  parent: FlashlightLantern
  id: ToolLightFlashlightHandheldBlackFilled
  suffix: Filled
  name: handheld flashlight (black)
  description: A small flashlight used to light up a small area.
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: HandheldLight
    addPrefix: false
    wattage: 0.5
  - type: ToggleableVisuals
    inhandVisuals:
      left:
      - state: inhand-left-light
        shader: unshaded
      right:
      - state: inhand-right-light
        shader: unshaded
  - type: Sprite
    sprite: _Cataclysm14/Objects/Tools/Lights/light_handheld.rsi
    scale: 0.3,0.3
    layers:
      - state: seclite
      - state: seclite-overlay
        shader: unshaded
        visible: false
        map: [ "light" ]
  - type: MeleeWeapon
    wideAnimationRotation: 90
    damage:
      types:
        Blunt: 10
    soundHit:
      collection: MetalThud
  - type: Item
    sprite: _Cataclysm14/Objects/Tools/Lights/light_handheld.rsi
    storedScale: 2.5
  - type: PointLight
    enabled: false
    radius: 6
  - type: Clothing
    sprite: _Cataclysm14/Objects/Tools/Lights/light_handheld.rsi
    quickEquip: false
    slots:
      - Belt

- type: entity
  parent: ToolLightFlashlightHandheldBlackFilled
  id: ToolLightFlashlightHandheldBlackEmpty
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default

