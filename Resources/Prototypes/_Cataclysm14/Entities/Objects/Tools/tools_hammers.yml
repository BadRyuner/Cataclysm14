  #MARK: Base
  - type: entity
    name: wrench
    parent: BaseItem
    id: BaseToolHammer
    abstract: true
    description: 'A common tool for assembly and disassembly. Can hit quite hard if swung with full force.'
    components:
    # Goobstation edit start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_Goobstation/Items/handling/wrench_pickup.ogg
        params:
          volume: -2
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/Items/wrench_drop.ogg
        params:
          volume: -2
    # Goobstation edit end
    - type: EmitSoundOnLand
      sound:
        path: /Audio/Items/wrench_drop.ogg
    - type: MeleeWeapon
      wideAnimationRotation: 135
      attackRate: 1.5
      damage:
        types:
          Blunt: 12
      soundHit:
        collection: MetalThud
    - type: Tool
      qualities:
      - Anchoring
      useSound:
        path: /Audio/Items/ratchet.ogg
    - type: PhysicalComposition
      materialComposition:
        Steel: 100