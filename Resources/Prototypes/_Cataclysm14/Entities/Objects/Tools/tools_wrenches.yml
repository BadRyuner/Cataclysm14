  #MARK: Base
  - type: entity
    name: wrench
    parent: BaseItem
    id: BaseToolWrench
    abstract: true
    description: 'A common tool for assembly and disassembly. Remember: lefty latchy, righty removey.'
    components:
    # Goobstation edit start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_Goobstation/Items/handling/wrench_pickup.ogg
        params:
          volume: -2
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/Items/wrench_drop.ogg
        params:
          volume: -2
    # Goobstation edit end
    - type: EmitSoundOnLand
      sound:
        path: /Audio/Items/wrench_drop.ogg
    - type: MeleeWeapon
      wideAnimationRotation: 135
      attackRate: 1.5
      damage:
        types:
          Blunt: 12
      soundHit:
        collection: MetalThud
    - type: Tool
      qualities:
      - Anchoring
      useSound:
        path: /Audio/Items/ratchet.ogg
    - type: PhysicalComposition
      materialComposition:
        Steel: 100

#MARK: Adjustable Wrench
  - type: entity
    parent: BaseToolWrench
    id: ToolWrenchAdjustable
    name: adjustable wrench
    components:
    - type: Item
      storedScale: 2.5
      storedRotation: 45
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 14
    - type: Sprite
      scale: 0.4,0.4
      sprite: _Cataclysm14/Objects/Tools/tool_adjustable_wrench.rsi
      state: icon
    - type: Tool
      qualities:
      - BoltTurningT1
      - BoltTurningT2
      - FineBoltTurningT1
      - HammeringT1

