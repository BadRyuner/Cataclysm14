#MARK: Epinephrine Autoinjector
- type: entity
  parent: ChemicalMedipen
  id: MedicalItemInjectorEpinephrine
  name: epinephrine autoinjector
  description: An emergency epinephrine autoinjector. Stabilizes patients in anaphylactic shock or cardiac arrest.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi # TODO: Replace with Cataclysm14-specific sprites
    layers:
    - state: medipen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: medipen_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 15
        reagents:
        - ReagentId: Epinephrine
          Quantity: 12
        - ReagentId: TranexamicAcid
          Quantity: 3
  - type: Tag
    tags: []

