#MARK: FirstAidKit
- type: entity
  parent: Medkit
  id: MedicalItemKitFirstAid
  name: first aid kit
  description: A standard first aid kit containing bandages, painkillers, and antiseptic. Basic but reliable.
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: firstaid
  - type: Item
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # TODO: Replace with Cataclysm14-specific sprites
    heldPrefix: firstaid

- type: entity
  parent: MedicalItemKitFirstAid
  id: MedicalItemKitFirstAidFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: MedicalItemBandageMedicalGauze
    - id: MedicalItemBandageProper
    - id: MedicalItemPillCanisterAspirin
    - id: MedicalItemAntiseptic

#MARK: IFAK
- type: entity
  parent: Medkit
  id: MedicalItemKitIFAK
  name: IFAK
  description: An Individual First Aid Kit issued to military personnel. Contains supplies for treating combat trauma.
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: blackkit
  - type: Item
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # TODO: Replace with Cataclysm14-specific sprites
    heldPrefix: blackkit

- type: entity
  parent: MedicalItemKitIFAK
  id: MedicalItemKitIFAKFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: MedicalItemHemostaticPowder
    - id: MedicalItemBandageProper
    - id: MedicalItemInjectorEpinephrine
    - id: MedicalItemPillCanisterCodeine

#MARK: HerbalistPouch
- type: entity
  parent: Medkit
  id: MedicalItemKitHerbalist
  name: herbalist's pouch
  description: A leather pouch containing various herbal remedies. Smells of dried herbs and essential oils.
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: firstaid
  - type: Item
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi # TODO: Replace with Cataclysm14-specific sprites
    heldPrefix: firstaid

- type: entity
  parent: MedicalItemKitHerbalist
  id: MedicalItemKitHerbalistFilled
  suffix: Filled
