#MARK: FirstAidKit
- type: entity
  parent: Medkit
  id: ContainerMedicineKitFirstAid
  name: first aid kit
  description: A standard first aid kit containing bandages, painkillers, and antiseptic. Basic but reliable.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Containers/medkit_box_medium_red.rsi
    state: icon
  - type: Item
    sprite: _Cataclysm14/Objects/Containers/medkit_box_medium_red.rsi
    state: icon

- type: entity
  parent: ContainerMedicineKitFirstAid
  id: ContainerMedicineKitFirstAidFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: ConsumableMedicineBandageMedicalGauze
    - id: ConsumableMedicineBandageProper
    - id: ConsumableMedicinePillCanisterAspirin
    - id: ConsumableMedicineAntiseptic

#MARK: IFAK
- type: entity
  parent: Medkit
  id: ContainerMedicineKitIFAK
  name: IFAK
  description: An Individual First Aid Kit issued to military personnel. Contains supplies for treating combat trauma.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Containers/medkit_IFAK.rsi
    state: icon
  - type: Item
    sprite: _Cataclysm14/Objects/Containers/medkit_IFAK.rsi
    state: icon

- type: entity
  parent: ContainerMedicineKitIFAK
  id: ContainerMedicineKitIFAKFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: ConsumableMedicineHemostaticPowder
    - id: ConsumableMedicineBandageProper
    - id: ConsumableMedicineInjectorEpinephrine
    - id: ConsumableMedicinePillCanisterCodeine

#MARK: HerbalistPouch
- type: entity
  parent: Medkit
  id: ContainerMedicineKitHerbalist
  name: herbalist's pouch
  description: A leather pouch containing various herbal remedies. Smells of dried herbs and essential oils.
  components:
  #missing proper sprite
  - type: Sprite
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi
    state: firstaid
  - type: Item
    sprite: _NF/Objects/Specific/Medical/firstaidkits.rsi
    heldPrefix: firstaid

- type: entity
  parent: ContainerMedicineKitHerbalist
  id: ContainerMedicineKitHerbalistFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: ConsumableMedicineHerbalPoppyPainkiller
      amount: 2
    - id: ConsumableMedicineHerbalCattailJelly
      amount: 2
    - id: ConsumableMedicineHerbalWintergreenOil
    - id: ConsumableMedicineHerbalThymeOil

#MARK: TraumaKit
- type: entity
  parent: Medkit
  id: ContainerMedicineKitTrauma
  name: trauma kit
  description: A trauma kit designed for treating catastrophic hemorrhage and severe injuries in the field.
  components:
  - type: Sprite
    sprite: _Cataclysm14/Objects/Containers/medkit_box_medium_red.rsi
    state: icon
  - type: Item
    sprite: _Cataclysm14/Objects/Containers/medkit_box_medium_red.rsi
    state: icon

- type: entity
  parent: ContainerMedicineKitTrauma
  id: ContainerMedicineKitTraumaFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: ConsumableMedicineHemostaticPowder
    - id: ConsumableMedicineBandageProper
    - id: ConsumableMedicineInjectorMorphine
    - id: ConsumableMedicineInjectorSaline
    - id: ConsumableMedicineAntisepticPowder
