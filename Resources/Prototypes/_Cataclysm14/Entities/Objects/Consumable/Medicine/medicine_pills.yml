#MARK: Aspirin
- type: entity
  parent: Pill
  id: MedicalItemPillAspirin
  name: aspirin
  description: Medication to reduce pain, inflammation, and fever.
  components:
  - type: Pill
    pillType: 4
  - type: Sprite
    state: pill5
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Bicaridine
          Quantity: 10

- type: entity
  parent: PillCanister
  id: MedicalItemPillCanisterAspirin
  name: pill canister
  suffix: aspirin, 5
  components:
  - type: Label
    currentLabel: aspirin
  - type: StorageFill
    contents:
    - id: MedicalItemPillAspirin
      amount: 5

