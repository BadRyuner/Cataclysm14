#MARK: Aspirin
- type: entity
  parent: Pill
  id: ConsumableMedicinePillAspirin
  name: aspirin
  description: Medication to reduce pain, inflammation, and fever.
  components:
  - type: Pill
    pillType: 4
  - type: Sprite
    state: pill5
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Bicaridine
          Quantity: 5

- type: entity
  parent: PillCanister
  id: ConsumableMedicinePillCanisterAspirin
  name: pill canister
  suffix: aspirin, 5
  components:
  - type: Label
    currentLabel: aspirin
  - type: StorageFill
    contents:
    - id: ConsumableMedicinePillAspirin
      amount: 5

