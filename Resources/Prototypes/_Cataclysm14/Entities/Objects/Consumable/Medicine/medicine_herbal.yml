#MARK: PoppyPainkiller
- type: entity
  parent: Pill
  id: ConsumableMedicineHerbalPoppyPainkiller
  name: poppy painkiller
  description: A refined opioid analgesic derived from mutant poppies. Effective pain relief with mild sedative properties.
  components:
  - type: Pill
    pillType: 7
  - type: Sprite
    state: pill8
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Bicaridine
          Quantity: 5
        - ReagentId: Inaprovaline
          Quantity: 3

