#MARK: MakeshiftBandage
- type: entity
  parent: BaseHealingItem
  id: MedicalItemBandageMakeshift
  name: makeshift bandage
  description: A makeshift bandage fashioned from a torn piece of cloth. Not sterile, but better than nothing.
  components:
  - type: Tag
    tags:
    - Brutepack
  - type: Sprite
    sprite: _DV/Objects/Specific/medical.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: brutepack
  - type: Item
    heldPrefix: brutepack
  - type: Healing
    damageContainers:
    - Biological
    damage:
      groups:
        Brute: -25
    bloodlossModifier: -4
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: MedicalItemBandageMakeshift
    count: 10

