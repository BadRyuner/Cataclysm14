  description: "Crushed wild berries strained into a tart, sweet juice. A rare treat."
  components:
  - type: FlavorProfile
    flavors:
    - sweet
    - berry
  - type: Sprite
    sprite: Objects/Consumable/Drinks/glass_clear.rsi  # TODO: Replace with Cataclysm14-specific sprites
    state: icon
  - type: Item
    size: Small
  - type: Perishable
    molsPerSecondPerUnitMass: 0
  - type: RotInto
    entity: FoodSpoiledMoldy
    stage: 1
  - type: SolutionContainerManager
