#MARK: VenisonRaw
- type: entity
  parent: FoodMeatRawBase
  id: ConsumableFoodMeatVenisonRaw
  name: raw venison
  description: "A slab of raw deer meat. Lean, gamey, and best not eaten as-is."
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - gamey
  - type: Sprite
    sprite: _Cataclysm14/Objects/Consumable/Food/meat_old_file_replace.rsi
    state: plain
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 10
        - ReagentId: Fat
          Quantity: 5

