# Cataclysm14 CDDA-themed survival drinks

- type: entity
  parent: FoodInjectableBase
  id: FoodCDDADrinkBoiledWater
  name: boiled water
  description: "Water that has been boiled to kill pathogens. Safe to drink. Tastes like warm nothing."
  components:
  - type: FlavorProfile
    flavors:
    - bland
  - type: Sprite
    sprite: Objects/Consumable/Drinks/waterbottle.rsi  # TODO: Replace with Cataclysm14-specific sprites
    state: icon
  - type: Item
    size: Small
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25
        reagents:
        - ReagentId: Water
          Quantity: 20

- type: entity
  parent: FoodInjectableBase
  id: FoodCDDADrinkMurkyWater
  name: murky water
  description: "Cloudy, questionable water scooped from a puddle. Drinking this is a gamble."
