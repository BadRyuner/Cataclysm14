# CDDA-themed canned food items

# 1. Canned Chicken Soup

- type: entity
  parent: FoodTinBase
  id: FoodCDDATinChickenSoup
  name: canned chicken soup
  description: "A dented tin of chicken noodle soup. Still sealed, still edible. Comfort food for the end of the world."
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/peaches.rsi  # TODO: Replace with Cataclysm14-specific sprites
  - type: FlavorProfile
    flavors:
    - savory
    - salty
    - chicken
  - type: Openable
    openableByHand: true
    sound:
      path: /Audio/Items/can_open3.ogg
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Protein
          Quantity: 3
        - ReagentId: Vitamin
          Quantity: 2
  - type: Food
    trash:
    - FoodCDDATinChickenSoupTrash

- type: entity
  parent: FoodTinBaseTrash
  id: FoodCDDATinChickenSoupTrash
  name: canned chicken soup
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/peaches.rsi  # TODO: Replace with Cataclysm14-specific sprites

