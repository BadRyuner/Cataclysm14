#MARK: VenisonRaw
- type: entity
  parent: FoodMeatRawBase
  id: ConsumableFoodMeatVenisonRaw
  name: raw venison
  description: "A slab of raw deer meat. Lean, gamey, and best not eaten as-is."
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - gamey
  - type: Sprite
    sprite: _Cataclysm14/Objects/Consumable/Food/Meat/meat_venison.rsi
    state: venison-raw
    scale: 0.5,0.5
  - type: Item
    storedScale: 2.5
    shape:
    - 0,0,1,1
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 10
        - ReagentId: Fat
          Quantity: 5

