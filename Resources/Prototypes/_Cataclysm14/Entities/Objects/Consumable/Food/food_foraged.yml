#MARK: Blackberries
- type: entity
  parent: FoodInjectableBase
  id: ConsumableFoodWildBlackberries
  name: wild blackberries
  description: "A handful of dark, plump berries picked from thorny brambles. Sweet and tart."
  components:
  - type: FlavorProfile
    flavors:
    - sweet
    - berry
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/berries.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: produce
  - type: Item
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: Vitamin
          Quantity: 3
  - type: Tag
    tags:
    - Fruit
  - type: Perishable
    molsPerSecondPerUnitMass: 0
  - type: RotInto
    entity: FoodSpoiledMoldy
    stage: 1

