# CDDA-themed MRE and ration prototypes

- type: entity
  name: military MRE pack
  parent: BaseItem
  id: FoodCDDAMREPack
  description: "A sealed military Meal Ready to Eat. Contains an entree, side, and dessert. Manufactured to survive anything... including your taste buds."
  components:
  - type: Sprite
    sprite: _Mono/Objects/Consumable/Food/mre_package.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: icon
  - type: Item
    sprite: _Mono/Objects/Consumable/Food/mre_package.rsi # TODO: Replace with Cataclysm14-specific sprites
    size: Small
  - type: SpawnItemsOnUse
    items:
    - id: FoodCDDAMREBeefStroganoff
      prob: 0.5
      orGroup: Entree
    - id: FoodCDDAMREChiliBeans
      prob: 0.5
      orGroup: Entree
    - id: FoodCDDAMREChickenNoodle
      prob: 0.5
      orGroup: Entree
    - id: FoodCDDAMREVegPasta
      prob: 0.5
      orGroup: Entree
    - id: FoodCDDAMREPoundCake
    - id: DrinkWaterBottleFull
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: FoodSnackBase
  id: FoodCDDAMREBeefStroganoff
  name: MRE beef stroganoff
  description: "Beef stroganoff in a retort pouch. The noodles are surprisingly intact."
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - savory
    - cheap
  - type: Sprite
    sprite: _Mono/Objects/Consumable/Food/mre_main.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: icon
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 12
        - ReagentId: Protein
          Quantity: 6
        - ReagentId: Fat
          Quantity: 2

