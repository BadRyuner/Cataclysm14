#MARK: MysteryCan
- type: entity
  parent: BaseItem
  id: ConsumableFoodJunkMysteryCan
  name: mystery can
  description: "A tin can with the label completely worn off. Could be anything from peaches to cat food. Spin the wheel."
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/beans.rsi  # TODO: Replace with Cataclysm14-specific sprites
    state: icon
  - type: Item
    size: Small
  - type: SpawnItemsOnUse
    items:
    - id: ContainerFoodTinChickenSoup
      prob: 0.3
      orGroup: Contents
    - id: ContainerFoodTinBeans
      prob: 0.3
      orGroup: Contents
    - id: ContainerFoodTinSpam
      prob: 0.3
      orGroup: Contents
    - id: ContainerFoodTinCorn
      prob: 0.3
      orGroup: Contents
    - id: ContainerFoodTinDogFood
      prob: 0.1
      orGroup: Contents
    sound:
      path: /Audio/Items/can_open3.ogg

