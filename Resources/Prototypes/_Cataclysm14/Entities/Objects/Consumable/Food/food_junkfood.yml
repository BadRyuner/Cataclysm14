#MARK: StaleChips
- type: entity
  parent: FoodSnackBase
  id: ConsumableFoodJunkStaleChips
  name: stale potato chips
  description: "A half-crushed bag of potato chips. Stale, but the salt is still going strong."
  components:
  - type: FlavorProfile
    flavors:
    - salty
    - oily
    - stale
  - type: Sprite
    sprite: Objects/Consumable/Food/snacks.rsi  # TODO: Replace with Cataclysm14-specific sprites
    state: chips
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Nutriment
          Quantity: 6
        - ReagentId: Fat
          Quantity: 3
        - ReagentId: Sugar
          Quantity: 1

