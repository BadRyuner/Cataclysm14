#MARK: BeefStroganoff
- type: entity
  parent: FoodSnackBase
  id: ConsumableFoodMREBeefStroganoff
  name: MRE beef stroganoff
  description: "Beef stroganoff in a retort pouch. The noodles are surprisingly intact."
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - savory
    - cheap
  - type: Sprite
    sprite: _Mono/Objects/Consumable/Food/mre_main.rsi
    state: icon
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 12
        - ReagentId: Protein
          Quantity: 6
        - ReagentId: Fat
          Quantity: 2

