#MARK: ChickenSoup
- type: entity
  parent: FoodTinBase
  id: ConsumableFoodTinChickenSoup
  name: canned chicken soup
  description: "A dented tin of chicken noodle soup. Still sealed, still edible. Comfort food for the end of the world."
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/peaches.rsi  # TODO: Replace with Cataclysm14-specific sprites
  - type: FlavorProfile
    flavors:
    - savory
    - salty
    - chicken
  - type: Openable
    openableByHand: true
    sound:
      path: /Audio/Items/can_open3.ogg
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Protein
          Quantity: 3
        - ReagentId: Vitamin
          Quantity: 2
  - type: Food
    trash:
    - ConsumableFoodTinChickenSoupTrash

- type: entity
  parent: FoodTinBaseTrash
  id: ConsumableFoodTinChickenSoupTrash
  name: canned chicken soup
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/peaches.rsi  # TODO: Replace with Cataclysm14-specific sprites

