#MARK: ChickenSoup
- type: entity
  parent: FoodTinBase
  id: ConsumableFoodCannedChickenSoup
  name: canned chicken soup
  description: "A dented tin of chicken noodle soup. Still sealed, still edible. Comfort food for the end of the world."
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/peaches.rsi
    scale: 0.5,0.5
  - type: Item
    storedScale: 2.5
    shape:
    - 0,0,1,1
  - type: FlavorProfile
    flavors:
    - savory
    - salty
    - chicken
  - type: Openable
    openableByHand: true
    sound:
      path: /Audio/Items/can_open3.ogg
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Protein
          Quantity: 3
        - ReagentId: Vitamin
          Quantity: 2
  - type: Food
    trash:
    - ConsumableFoodCannedChickenSoupTrash

- type: entity
  parent: FoodTinBaseTrash
  id: ConsumableFoodCannedChickenSoupTrash
  name: canned chicken soup
  suffix: Trash
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/peaches.rsi
    scale: 0.5,0.5
  - type: Item
    storedScale: 2.5
    shape:
    - 0,0,1,1

