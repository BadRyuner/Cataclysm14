- type: entity
  parent: BaseItem
  id: FoodCDDAJunkMysteryCan
  name: mystery can
  description: "A tin can with the label completely worn off. Could be anything from peaches to cat food. Spin the wheel."
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/Tins/beans.rsi  # TODO: Replace with Cataclysm14-specific sprites
    state: icon
  - type: Item
    size: Small
  - type: SpawnItemsOnUse
    items:
    - id: FoodCDDATinChickenSoup
      prob: 0.3
      orGroup: Contents
    - id: FoodCDDATinBeans
      prob: 0.3
      orGroup: Contents
    - id: FoodCDDATinSpam
      prob: 0.3
      orGroup: Contents
    - id: FoodCDDATinCorn
      prob: 0.3
      orGroup: Contents
    - id: FoodCDDATinDogFood
      prob: 0.1
      orGroup: Contents
    sound:
      path: /Audio/Items/can_open3.ogg

