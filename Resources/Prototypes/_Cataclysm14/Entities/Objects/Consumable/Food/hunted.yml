# CDDA-themed hunted game meat items

# Raw

- type: entity
  parent: FoodMeatRawBase
  id: FoodCDDAMeatVenisonRaw
  name: raw venison
  description: "A slab of raw deer meat. Lean, gamey, and best not eaten as-is."
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - gamey
  - type: Sprite
    sprite: Objects/Consumable/Food/meat.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: plain
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 10
        - ReagentId: Fat
          Quantity: 5

