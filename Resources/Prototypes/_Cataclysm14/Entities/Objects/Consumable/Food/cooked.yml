# CDDA-themed cooked meal prototypes

# Soups & Stews

- type: entity
  parent: FoodBowlBase
  id: FoodCDDASoupBoneBroth
  name: bone broth
  description: "Clear, golden broth made from boiled bones. Restorative and warming. The foundation of post-apocalyptic cuisine."
  components:
  - type: FlavorProfile
    flavors:
    - savory
    - rich
  - type: Sprite
    sprite: Objects/Consumable/Food/bowl.rsi # TODO: Replace with Cataclysm14-specific sprites
    state: stew
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 35
        reagents:
        - ReagentId: Nutriment
          Quantity: 8
        - ReagentId: Protein
          Quantity: 4
        - ReagentId: Vitamin
          Quantity: 4

