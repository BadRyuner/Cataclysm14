#MARK: Blackberry
- type: entity
  parent: BasePlantBush
  id: PlantBushBlackberry
  name: blackberry bush
  components:
  - type: Sprite
    sprite: _Cataclysm14/Plants/Bushes/bush_blackberry.rsi
    state: summer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 12
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/plant_rustle.ogg
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          Log:
            min: 2
            max: 4
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCloth1:
            min: 0
            max: 4

