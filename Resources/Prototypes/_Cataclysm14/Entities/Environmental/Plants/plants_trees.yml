#MARK: Oak
- type: entity
  parent: BasePlantTree
  id: PlantTreeOak
  name: oak tree
  components:
  - type: Sprite
    sprite: _Cataclysm14/Plants/Trees/tree_oak.rsi
    state: base
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 12
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/plant_rustle.ogg
          params:
            volume: 5
            variation: 0.05
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectWoodLogStack1:
            min: 2
            max: 4

