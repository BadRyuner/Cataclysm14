#MARK: Boulder Small
- type: entity
  parent: BaseEnvironmentalBoulder
  id: EnvironmentalBoulderSmall
  name: small boulder
  components:
  - type: Sprite
    sprite: _Cataclysm14/Structures/Misc/boulder_small.rsi
    state: icon
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialObjectMineralRockStoneStack1:
            min: 2
            max: 4
      # - !type:PlaySoundBehavior
      #   sound:
      #     path: /Audio/Effects/plant_rustle.ogg
      #     params:
      #       volume: 5
      #       variation: 0.05

