#MARK: Rebar Graph
- type: constructionGraph
  id: Rebar
  start: start
  graph:
    - node: start
      edges:
        - to: Rebar
          completed:
            - !type:SnapToGrid {}
              # southRotation: true # Frontier
          steps:
            - material: Rebar
              amount: 2
              doAfter: 1
#MARK: Rebar Node
    - node: Rebar
      entity: StructureWallCataRebar
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetRebar1
              amount: 2
            - !type:DeleteEntity {}
          conditions:
            - !type:EntityAnchored
              anchored: false
          steps:
            - tool: Screwing
              doAfter: 2

#MARK: Reinforced Metal
        - to: StructureWallCataMetalReinforced
          completed:
            - !type:SnapToGrid
              southRotation: true
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Steel
              amount: 5
              doAfter: 2

#MARK: Reinforced Brick
        - to: StructureWallCataBrickRedRedReinforced
          completed:
            - !type:SnapToGrid
              southRotation: true
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Brick
              amount: 5
              doAfter: 2

#MARK: Reinforced Concrete
        - to: StructureWallCataConcreteReinforcedWhite
          completed:
            - !type:SnapToGrid
              southRotation: true
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Concrete
              amount: 5
              doAfter: 2

#MARK: Solid metal
        - to: StructureWallCataMetalSimpleBase
          completed:
            - !type:SnapToGrid
              southRotation: true
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Concrete
              amount: 5
              doAfter: 2

#MARK: Nodes >>>>







#MARK: Reinforced Metal
    - node: StructureWallCataMetalReinforced
      entity: StructureWallCataMetalReinforced
      edges:
        - to: Rebar
          completed:
            - !type:GivePrototype
              prototype: SheetSteel1
              amount: 5
          steps:
            - tool: Welding
              doAfter: 20
            - tool: Prying
              doAfter: 10

