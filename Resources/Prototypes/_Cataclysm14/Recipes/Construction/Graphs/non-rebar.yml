#MARK: Brick
- type: constructionGraph
  id: StructureWallCataBrickRedRedBase
  start: start
  graph:
    - node: start
      edges:
        - to: StructureWallCataBrickRedRedBase
          completed:
            - !type:SnapToGrid {}
              # southRotation: true # Frontier
          steps:
            - material: Brick
              amount: 2
              doAfter: 1

    - node: StructureWallCataBrickRedRedBase
      entity: StructureWallCataBrickRedRedBase
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetBrick1
              amount: 2
            - !type:DeleteEntity {}
          conditions:
            - !type:EntityAnchored
              anchored: false
          steps:
            - tool: Screwing
              doAfter: 2

